providers:
  - id: gemini-cli
    type: cli
    description: Gemini CLI adapter
    models:
      - id: gemini-3.1-pro-preview
        providerModel: gemini-3.1-pro-preview
        fallbackModels:
          - gemini-3-flash-preview
          - gpt-5.5
          - gpt-5.4
      - id: gemini-3-flash-preview
        providerModel: gemini-3-flash-preview
        fallbackModels:
          - gemini-3.1-pro-preview
          - gpt-5.5
          - gpt-5.4
      - id: gemini-3.1-flash-lite-preview
        providerModel: gemini-3.1-flash-lite-preview
        fallbackModels:
          - gemini-3-flash-preview
      - id: gemini-2.5-pro
        providerModel: gemini-2.5-pro
        fallbackModels:
          - gemini-3.1-pro-preview
      - id: gemini-2.5-flash
        providerModel: gemini-2.5-flash
        fallbackModels:
          - gemini-3-flash-preview
    responseCommand:
      executable: node
      args:
        - dist/scripts/gemini-cli-bridge.js
        - --model
        - "{{provider_model}}"
      input: request_json_stdin
      output: json_contract
      timeoutMs: 240000
    sessionCommand:
      executable: gemini
      args: []
      env:
        TERM: xterm-256color
      supportsWorkingDirectory: true
      idleTimeoutMs: 1800000
      maxLifetimeMs: 14400000
      ptyMode: auto
    auth:
      loginCommand:
        executable: sh
        args:
          - -c
          - |
            echo "Gemini CLI login is interactive in this version."
            echo "Run in a TTY shell: gemini"
            echo "Then run: /auth and choose Login with Google."
            exit 1
        timeoutMs: 900000
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            test -f "$HOME/.gemini/oauth_creds.json" \
              && echo '{"ok":true,"source":"oauth_creds.json"}' \
              || (echo '{"ok":false,"error":"missing ~/.gemini/oauth_creds.json"}' && exit 1)
        timeoutMs: 30000
      # Example: Rate limit check command
      # This should output JSON with rate limit information
      # rateLimitCommand:
      #   executable: opencode
      #   args:
      #     - account
      #     - limits
      #     - --json
      #   timeoutMs: 30000

  - id: antigravity-cli
    type: cli
    description: Antigravity CLI adapter
    models:
      - id: antigravity-default
        providerModel: default
    responseCommand:
      executable: antigravity
      args:
        - chat
        - --model
        - "{{provider_model}}"
        - --json
      input: request_json_stdin
      output: json_contract
      timeoutMs: 240000
    auth:
      loginCommand:
        executable: antigravity
        args:
          - auth
          - login
          - --no-browser
        timeoutMs: 900000
      statusCommand:
        executable: antigravity
        args:
          - auth
          - status
          - --json
        timeoutMs: 30000

  - id: codex-cli
    type: cli
    description: OpenAI Codex app-server bridge adapter
    models:
      - id: codex-latest
        providerModel: codex-latest
        fallbackModels:
          - gpt-5.5
          - gpt-5.4
          - gemini-3.1-pro-preview
      - id: gpt-5.5
        providerModel: gpt-5.5
        fallbackModels:
          - gpt-5.4
          - gpt-5.4-pro
          - gemini-3.1-pro-preview
      - id: gpt-5.4
        providerModel: gpt-5.4
        fallbackModels:
          - gpt-5.5
          - gpt-5.4-pro
          - gemini-3.1-pro-preview
      - id: gpt-5.4-pro
        providerModel: gpt-5.4-pro
        fallbackModels:
          - gpt-5.5
          - gpt-5.4
          - gemini-3.1-pro-preview
      - id: gpt-5.3-instant
        providerModel: gpt-5.3-instant
        fallbackModels:
          - gpt-5.5
          - gpt-5.4
      - id: gpt-4.1
        providerModel: gpt-4.1
        fallbackModels:
          - gpt-5.3-instant
    responseCommand:
      executable: node
      args:
        - dist/scripts/codex-appserver-bridge.js
        - --model
        - "{{provider_model}}"
      input: request_json_stdin
      output: json_contract
      timeoutMs: 240000
    sessionCommand:
      executable: "{{codex_executable}}"
      args: []
      loginArgs:
        - login
        - --device-auth
      env:
        TERM: xterm-256color
      supportsWorkingDirectory: true
      idleTimeoutMs: 1800000
      maxLifetimeMs: 14400000
      ptyMode: auto
    auth:
      loginCommand:
        executable: "{{codex_executable}}"
        args:
          - login
          - --device-auth
        timeoutMs: 900000
      statusCommand:
        executable: "{{codex_executable}}"
        args:
          - login
          - status
        timeoutMs: 30000
      # Example: OpenAI rate limit check
      # This would call the OpenAI API to check usage/limits
      # rateLimitCommand:
      #   executable: sh
      #   args:
      #     - -c
      #     - |
      #       curl -s https://api.openai.com/v1/dashboard/billing/credit_grants \
      #         -H "Authorization: Bearer $OPENAI_API_KEY" \
      #         -H "Content-Type: application/json" | \
      #         jq '{limitType: "credits", remaining: .total_available, maxAllowed: .total_granted}'
      #   timeoutMs: 30000

  # Optional direct OpenAI Images API fallback. Frontend image requests prefer
  # the Codex app-server bridge when a Codex-backed model is configured.
  - id: openai-image-api
    type: openai
    description: Optional direct OpenAI Images API fallback
    baseUrl: https://api.openai.com/v1
    apiKeyEnv: OPENAI_API_KEY
    timeoutMs: 240000
    models:
      - id: gpt-image-1.5
        providerModel: gpt-image-1.5
        fallbackModels:
          - gpt-image-1
          - gpt-image-1-mini
      - id: gpt-image-1
        providerModel: gpt-image-1
        fallbackModels:
          - gpt-image-1-mini
      - id: gpt-image-1-mini
        providerModel: gpt-image-1-mini

  # ============================================================================
  # FREE AI SERVICES
  # ============================================================================

  - id: ollama-local
    type: cli
    description: Local LLMs via Ollama (completely free, runs locally)
    models:
      - id: llama3.2
        providerModel: llama3.2
        fallbackModels:
          - mistral
      - id: mistral
        providerModel: mistral
        fallbackModels:
          - codellama
      - id: codellama
        providerModel: codellama
        fallbackModels:
          - llama3.2
      - id: phi4
        providerModel: phi4
      - id: qwen2.5
        providerModel: qwen2.5
    responseCommand:
      executable: ollama
      args:
        - run
        - "{{provider_model}}"
      input: prompt_stdin
      output: text_plain
      timeoutMs: 300000
    # No auth needed for local Ollama

  - id: ollama-gemma4-cpu
    type: cli
    description: Local Ollama CPU-focused Gemma stack with Gemma 4 E4B primary and smaller fallbacks
    models:
      - id: gemma4-e4b
        providerModel: gemma4:e4b
        fallbackModels:
          - gemma4-e2b
          - gemma3-1b
      - id: gemma4-e2b
        providerModel: gemma4:e2b
        fallbackModels:
          - gemma3-1b
      - id: gemma3-1b
        providerModel: gemma3:1b
    responseCommand:
      executable: node
      args:
        - dist/scripts/ollama-api-bridge.js
        - --model
        - "{{provider_model}}"
      env:
        OLLAMA_BASE_URL: http://127.0.0.1:11434/api
        OLLAMA_NUM_CTX: "8192"
        OLLAMA_KEEP_ALIVE: "30m"
        OLLAMA_HTTP_TIMEOUT_MS: "540000"
      input: request_json_stdin
      output: json_contract
      timeoutMs: 600000
    # Recommended Ollama server settings for CPU-only use:
    #   OLLAMA_NUM_PARALLEL=1
    #   OLLAMA_MAX_LOADED_MODELS=1
    #   OLLAMA_CONTEXT_LENGTH=8192
    # No auth needed for local Ollama unless you secure it behind a proxy.

  - id: groq-api
    type: openai
    description: Groq API - auto-discovers chat-usable models at startup
    baseUrl: https://api.groq.com/openai/v1
    apiKeyEnv: GROQ_API_KEY
    timeoutMs: 60000
    discovery:
      enabled: true
      # Override the default chat filter if you want specific models only.
      # include:
      #   - groq/compound*
      #   - llama-3.1-8b-instant
      #   - llama-3.3-70b-versatile
      #   - openai/gpt-oss-*
      #   - meta-llama/llama-4-scout-17b-16e-instruct
      #   - qwen/qwen3-32b
      # exclude:
      #   - "*guard*"
    models:
      # Optional overrides for fallback chains or custom aliases.
      # If providerModel matches a discovered Groq model, this entry wins.
      - id: groq/compound
        providerModel: groq/compound
        fallbackModels:
          - openai/gpt-oss-20b
          - llama-3.3-70b-versatile
      - id: groq/compound-mini
        providerModel: groq/compound-mini
        fallbackModels:
          - openai/gpt-oss-20b
      - id: openai/gpt-oss-120b
        providerModel: openai/gpt-oss-120b
        fallbackModels:
          - openai/gpt-oss-20b
      - id: openai/gpt-oss-20b
        providerModel: openai/gpt-oss-20b
        fallbackModels:
          - llama-3.1-8b-instant
      - id: llama-3.3-70b-versatile
        providerModel: llama-3.3-70b-versatile
      - id: llama-3.1-8b-instant
        providerModel: llama-3.1-8b-instant

  - id: kimi-code-cli
    type: cli
    description: Kimi Code ACP bridge adapter
    models:
      - id: kimi-for-coding
        providerModel: kimi-for-coding
      - id: kimi-k2-turbo-preview
        providerModel: kimi-for-coding
    responseCommand:
      executable: node
      args:
        - dist/scripts/kimi-acp-bridge.js
        - --model
        - "{{provider_model}}"
      input: request_json_stdin
      output: json_contract
      timeoutMs: 240000
    sessionCommand:
      executable: kimi
      args: []
      env:
        TERM: xterm-256color
      supportsWorkingDirectory: true
      idleTimeoutMs: 1800000
      maxLifetimeMs: 14400000
      ptyMode: auto
    auth:
      loginCommand:
        executable: sh
        args:
          - -c
          - |
            echo "Kimi CLI login is interactive."
            echo "Run in a TTY shell: kimi"
            echo "Then run: /login and complete auth."
            echo "If your installed minor version still uses /setup, use that instead."
            exit 1
        timeoutMs: 900000
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            if [ -f "$HOME/.kimi/config.toml" ] || [ -f "$HOME/.kimi/config.json" ]; then
              echo '{"ok":true,"source":"~/.kimi/config.toml"}'
              exit 0
            fi
            echo '{"ok":false,"error":"missing ~/.kimi/config.toml or ~/.kimi/config.json (run kimi then /login, or /setup on older releases)"}'
            exit 1
        timeoutMs: 30000

  - id: deepseek-api
    type: openai
    description: DeepSeek API - excellent for coding tasks with free tier
    baseUrl: https://api.deepseek.com
    apiKeyEnv: DEEPSEEK_API_KEY
    timeoutMs: 120000
    models:
      - id: deepseek-chat
        providerModel: deepseek-chat
        fallbackModels:
          - deepseek-reasoner
      - id: deepseek-coder
        providerModel: deepseek-chat
        description: Backward-compatible DeepSeek coding alias mapped to deepseek-chat
        fallbackModels:
          - deepseek-reasoner
      - id: deepseek-reasoner
        providerModel: deepseek-reasoner
        fallbackModels:
          - deepseek-chat

  # ============================================================================
  # FREE IMAGE & MULTIMODAL SERVICES
  # ============================================================================

  - id: pollinations-image
    type: cli
    description: Free image generation via Pollinations AI (no API key needed)
    models:
      - id: pollinations-flux
        providerModel: flux
      - id: pollinations-turbo
        providerModel: turbo
    responseCommand:
      executable: sh
      args:
        - -c
        - |
          set -e
          # Create temp directory for image
          TMP_DIR=$(mktemp -d)
          trap "rm -rf $TMP_DIR" EXIT
          
          # URL encode the prompt
          PROMPT_ENCODED=$(echo "{{prompt}}" | sed 's/ /%20/g; s/"/%22/g; s/#/%23/g; s/&/%26/g')
          SEED=$((RANDOM % 999999))
          IMAGE_URL="https://image.pollinations.ai/prompt/${PROMPT_ENCODED}?seed=${SEED}&width=1024&height=1024&nologo=true&model={{provider_model}}"
          
          # Download image
          curl -sL "$IMAGE_URL" -o "$TMP_DIR/image.png"
          
          # Convert to base64 and output as JSON
          B64=$(base64 -w 0 "$TMP_DIR/image.png" 2>/dev/null || base64 "$TMP_DIR/image.png" | tr -d '\n')
          echo "{\"data\":[{\"b64_json\":\"${B64}\"}]}"
      input: prompt_stdin
      output: json_contract
      timeoutMs: 120000

  - id: huggingface-image
    type: cli
    description: Free image generation via Hugging Face Inference API
    models:
      - id: hf-stable-diffusion-xl
        providerModel: stabilityai/stable-diffusion-xl-base-1.0
      - id: hf-playground-v2.5
        providerModel: playgroundai/playground-v2.5-1024px-aesthetic
      - id: hf-flux-schnell
        providerModel: black-forest-labs/FLUX.1-schnell
    responseCommand:
      executable: sh
      args:
        - -c
        - |
          set -e
          TMP_DIR=$(mktemp -d)
          trap "rm -rf $TMP_DIR" EXIT
          
          # Generate image via Hugging Face API
          curl -s -X POST "https://api-inference.huggingface.co/models/{{provider_model}}" \
            -H "Authorization: Bearer $HF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"inputs\": \"{{prompt}}\"}" \
            -o "$TMP_DIR/image.png"
          
          # Check if we got valid image
          if file "$TMP_DIR/image.png" | grep -q "image"; then
            B64=$(base64 -w 0 "$TMP_DIR/image.png" 2>/dev/null || base64 "$TMP_DIR/image.png" | tr -d '\n')
            echo "{\"data\":[{\"b64_json\":\"${B64}\"}]}"
          else
            # May be loading or error
            cat "$TMP_DIR/image.png"
            exit 1
          fi
      input: prompt_stdin
      output: json_contract
      timeoutMs: 180000
    auth:
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            if [ -z "$HF_API_TOKEN" ]; then
              echo '{"ok":false,"error":"HF_API_TOKEN not set"}'
              exit 1
            fi
            curl -s -o /dev/null -w "%{http_code}" \
              https://api-inference.huggingface.co/models/gpt2 \
              -H "Authorization: Bearer $HF_API_TOKEN" | grep -q "200" && \
              echo '{"ok":true}' || echo '{"ok":false,"error":"Check token"}'
        timeoutMs: 15000

  - id: huggingface-whisper
    type: cli
    description: Free speech-to-text via Hugging Face Whisper
    models:
      - id: hf-whisper-large
        providerModel: openai/whisper-large-v3
      - id: hf-whisper-base
        providerModel: openai/whisper-base
    responseCommand:
      executable: sh
      args:
        - -c
        - |
          # Expects audio file path in prompt
          curl -s https://api-inference.huggingface.co/models/{{provider_model}} \
            -H "Authorization: Bearer $HF_API_TOKEN" \
            --data-binary "@{{prompt}}" | \
            sed 's/.*"text":"\([^"]*\)".*/\1/'
      input: prompt_stdin
      output: text_plain
      timeoutMs: 120000
    auth:
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            [ -z "$HF_API_TOKEN" ] && echo '{"ok":false}' || echo '{"ok":true}'
        timeoutMs: 5000

  - id: gemini-flash-free
    type: cli
    description: Gemini Flash via Google AI Studio (generous free tier)
    models:
      - id: gemini-3-flash-preview
        providerModel: gemini-3-flash-preview
      - id: gemini-3.1-flash-lite-preview
        providerModel: gemini-3.1-flash-lite-preview
      - id: gemini-2.5-flash
        providerModel: gemini-2.5-flash
      - id: gemini-2.5-flash-lite
        providerModel: gemini-2.5-flash-lite
    responseCommand:
      executable: curl
      args:
        - -s
        - "https://generativelanguage.googleapis.com/v1beta/models/{{provider_model}}:generateContent"
        - -H
        - "Content-Type: application/json"
        - -H
        - "x-goog-api-key: $GEMINI_API_KEY"
        - -d
        - |
          {
            "contents": [{"parts":[{"text":"{{prompt}}"}]}],
            "generationConfig": {"temperature":0.7,"maxOutputTokens":2048}
          }
      input: prompt_stdin
      output: text_contract_final_line
      timeoutMs: 60000
    auth:
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            if [ -z "$GEMINI_API_KEY" ]; then
              echo '{"ok":false,"error":"GEMINI_API_KEY not set"}'
              exit 1
            fi
            curl -s -o /dev/null -w "%{http_code}" \
              "https://generativelanguage.googleapis.com/v1beta/models?key=$GEMINI_API_KEY" | grep -q "200" && \
              echo '{"ok":true}' || echo '{"ok":false,"error":"Invalid API key"}'
        timeoutMs: 10000

  # ============================================================================
  # FREE AUDIO SERVICES (Speech-to-Text & Text-to-Speech)
  # ============================================================================

  - id: groq-whisper
    type: cli
    description: Fast speech-to-text via Groq (Whisper API) - generous free tier
    models:
      - id: groq-whisper-large-v3
        providerModel: whisper-large-v3
      - id: groq-whisper-v3-turbo
        providerModel: whisper-v3-turbo
    responseCommand:
      executable: sh
      args:
        - -c
        - |
          set -e
          # Expects audio file path in prompt
          AUDIO_FILE="{{prompt}}"
          if [ ! -f "$AUDIO_FILE" ]; then
            echo '{"text":"Error: Audio file not found"}'
            exit 1
          fi
          
          curl -s https://api.groq.com/openai/v1/audio/transcriptions \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -F file="@$AUDIO_FILE" \
            -F model="{{provider_model}}" \
            -F response_format=json
      input: prompt_stdin
      output: text_contract_final_line
      timeoutMs: 120000
    auth:
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            if [ -z "$GROQ_API_KEY" ]; then
              echo '{"ok":false,"error":"GROQ_API_KEY not set"}'
              exit 1
            fi
            curl -s -o /dev/null -w "%{http_code}" \
              https://api.groq.com/openai/v1/models \
              -H "Authorization: Bearer $GROQ_API_KEY" | grep -q "200" && \
              echo '{"ok":true}' || echo '{"ok":false,"error":"Invalid API key"}'
        timeoutMs: 10000

  - id: huggingface-tts
    type: cli
    description: Free text-to-speech via Hugging Face (speecht5, bark, etc)
    models:
      - id: hf-speecht5-tts
        providerModel: microsoft/speecht5_tts
      - id: hf-bark
        providerModel: suno/bark
      - id: hf-fastspeech2
        providerModel: facebook/fastspeech2-en-ljspeech
    responseCommand:
      executable: sh
      args:
        - -c
        - |
          set -e
          TMP_DIR=$(mktemp -d)
          trap "rm -rf $TMP_DIR" EXIT
          
          # Call Hugging Face Inference API for TTS
          curl -s -X POST "https://api-inference.huggingface.co/models/{{provider_model}}" \
            -H "Authorization: Bearer $HF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"inputs\": \"{{prompt}}\"}" \
            -o "$TMP_DIR/audio.wav"
          
          # Check if we got valid audio
          if file "$TMP_DIR/audio.wav" | grep -q "audio\|WAVE\|RIF"; then
            B64=$(base64 -w 0 "$TMP_DIR/audio.wav" 2>/dev/null || base64 "$TMP_DIR/audio.wav" | tr -d '\n')
            echo "{\"audio\":\"${B64}\",\"format\":\"wav\"}"
          else
            # May be loading or error - output as text
            cat "$TMP_DIR/audio.wav"
            exit 1
          fi
      input: prompt_stdin
      output: json_contract
      timeoutMs: 180000
    auth:
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            if [ -z "$HF_API_TOKEN" ]; then
              echo '{"ok":false,"error":"HF_API_TOKEN not set"}'
              exit 1
            fi
            curl -s -o /dev/null -w "%{http_code}" \
              https://api-inference.huggingface.co/models/gpt2 \
              -H "Authorization: Bearer $HF_API_TOKEN" | grep -q "200" && \
              echo '{"ok":true}' || echo '{"ok":false,"error":"Check token"}'
        timeoutMs: 15000

  - id: piper-tts-local
    type: cli
    description: Local text-to-speech via Piper (privacy-friendly, runs offline)
    models:
      - id: piper-en-us
        providerModel: en_US-lessac-medium
      - id: piper-en-gb
        providerModel: en_GB-alan-medium
      - id: piper-de-de
        providerModel: de_DE-thorsten-medium
    responseCommand:
      executable: sh
      args:
        - -c
        - |
          set -e
          TMP_DIR=$(mktemp -d)
          trap "rm -rf $TMP_DIR" EXIT
          
          MODEL_FILE="$HOME/.local/share/piper/{{provider_model}}.onnx"
          
          # Check if model exists, if not suggest download
          if [ ! -f "$MODEL_FILE" ]; then
            echo "{\"error\":\"Model not found. Install with: piper-download --model {{provider_model}}\"}"
            exit 1
          fi
          
          # Generate audio
          echo "{{prompt}}" | piper --model "$MODEL_FILE" --output_file "$TMP_DIR/audio.wav"
          
          # Convert to base64
          B64=$(base64 -w 0 "$TMP_DIR/audio.wav" 2>/dev/null || base64 "$TMP_DIR/audio.wav" | tr -d '\n')
          echo "{\"audio\":\"${B64}\",\"format\":\"wav\"}"
      input: prompt_stdin
      output: json_contract
      timeoutMs: 60000

  - id: gemini-audio
    type: cli
    description: Gemini Flash audio understanding (multimodal audio input)
    models:
      - id: gemini-audio-flash
        providerModel: gemini-2.5-flash
    responseCommand:
      executable: sh
      args:
        - -c
        - |
          set -e
          # Expects base64-encoded audio in prompt with format "data:audio/mp3;base64,..."
          AUDIO_DATA="{{prompt}}"
          
          # Extract mime type and base64 data
          MIME_TYPE=$(echo "$AUDIO_DATA" | sed 's/data:\([^;]*\);base64,.*/\1/')
          B64_DATA=$(echo "$AUDIO_DATA" | sed 's/data:[^;]*;base64,//')
          
          curl -s "https://generativelanguage.googleapis.com/v1beta/models/{{provider_model}}:generateContent" \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "{
              \"contents\": [{
                \"parts\": [
                  {\"inline_data\": {\"mime_type\": \"$MIME_TYPE\", \"data\": \"$B64_DATA\"}},
                  {\"text\": \"Transcribe this audio\"}
                ]
              }]
            }" | jq -r '.candidates[0].content.parts[0].text // "Error processing audio"'
      input: prompt_stdin
      output: text_plain
      timeoutMs: 120000
    auth:
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            if [ -z "$GEMINI_API_KEY" ]; then
              echo '{"ok":false,"error":"GEMINI_API_KEY not set"}'
              exit 1
            fi
            curl -s -o /dev/null -w "%{http_code}" \
              "https://generativelanguage.googleapis.com/v1beta/models?key=$GEMINI_API_KEY" | grep -q "200" && \
              echo '{"ok":true}' || echo '{"ok":false,"error":"Invalid API key"}'
        timeoutMs: 10000
