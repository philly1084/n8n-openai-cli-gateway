              if(parsedSynthetic&&typeof parsedSynthetic==="object"){
                syntheticCall=parsedSynthetic;
              }
            }catch{}
            const normalizeName=(name)=>String(name??"").trim().replace(/([a-z0-9])([A-Z])/g,"$1_$2").replace(/[\s\-./]+/g,"_").replace(/[^A-Za-z0-9_]/g,"_").replace(/_+/g,"_").replace(/^_+|_+$/g,"").toLowerCase();
            const allowedMap=new Map(allowedNames.map(n=>[normalizeName(n),n]));
            const normalizeAlias=(name)=>normalizeName(name).replace(/^(tool_|function_|fn_)+/,"").replace(/(_tool|_function|_fn|_api|_call)+$/,"");
            const resolveAllowedName=(name)=>{const raw=String(name??"").trim(); if(!raw) return ""; if(allowedMap.size===0) return raw; const direct=allowedMap.get(normalizeName(raw)); if(direct) return direct; const aliasNorm=normalizeAlias(raw); if(aliasNorm){const alias=allowedMap.get(aliasNorm); if(alias) return alias;} if(allowedNames.length===1){return allowedNames[0];} return "";};
            const getProp=(obj,keyCandidates)=>{if(!obj||typeof obj!=="object") return undefined; const source=obj; for(const key of keyCandidates){ if(Object.prototype.hasOwnProperty.call(source,key)){ return source[key]; }} const normalizedCandidates=keyCandidates.map(k=>normalizeName(k)); for(const [rawKey,val] of Object.entries(source)){ const normalizedRaw=normalizeName(rawKey); if(normalizedCandidates.includes(normalizedRaw)){ return val; }} return undefined;};
            const sanitizeArgKeys=(value,depth=0)=>{ if(depth>20) return value; if(Array.isArray(value)){ return value.map(item=>sanitizeArgKeys(item,depth+1)); } if(value&&typeof value==="object"){ const out={}; for(const [rawKey,rawVal] of Object.entries(value)){ const trimmedKey=String(rawKey??"").trim(); const key=trimmedKey||String(rawKey??""); out[key]=sanitizeArgKeys(rawVal,depth+1); } return out; } return value; };
            const asArgs=(value)=>{ if(typeof value==="string"){ const t=value.trim(); if(t&&(t.startsWith("{")||t.startsWith("["))){ try{ return JSON.stringify(sanitizeArgKeys(JSON.parse(t))); }catch{ return value; }} return value; } try{ return JSON.stringify(sanitizeArgKeys(value??{})); }catch{ return "{}"; } };
            const normalizeCall=(entry,index)=>{ if(!entry||typeof entry!=="object") return null; const obj=entry; const fn=obj.function&&typeof obj.function==="object"?obj.function:null; const fnCall=obj.functionCall&&typeof obj.functionCall==="object"?obj.functionCall:null; const fnCallSnake=obj.function_call&&typeof obj.function_call==="object"?obj.function_call:null; const merged=fnCall||fnCallSnake||fn; const rawName=(typeof getProp(obj,["name"])==="string"&&getProp(obj,["name"])?getProp(obj,["name"]):"")||(typeof getProp(obj,["tool_name","toolName"])==="string"&&getProp(obj,["tool_name","toolName"])?getProp(obj,["tool_name","toolName"]):"")||(typeof getProp(merged,["name"])==="string"&&getProp(merged,["name"])?getProp(merged,["name"]):""); const name=String(rawName||"").trim(); if(!name) return null; const mappedName=resolveAllowedName(name); if(allowedMap.size>0&&!mappedName) return null; const argsFromObj=getProp(obj,["arguments","args","parameters"]); const argsFromMerged=getProp(merged,["arguments","args","parameters"]); const argsRaw=argsFromObj!==undefined?argsFromObj:(argsFromMerged!==undefined?argsFromMerged:{}); const idFromObj=getProp(obj,["id","call_id","tool_id","toolId"]); const id=(typeof idFromObj==="string"&&idFromObj?String(idFromObj).trim():"")||`call_${index+1}`; return { id, name:mappedName||name, arguments:asArgs(argsRaw) }; };
            const appendCall=(out,item)=>{ const call=normalizeCall(item,out.length); if(call) out.push(call); };
            const normalizeCallList=(items)=>{ const src=Array.isArray(items)?items:[]; const out=[]; for(let i=0;i<src.length;i++){ const call=normalizeCall(src[i],out.length); if(call) out.push(call); } return out; };
            const dedupeByKey=(items,keyFn)=>{ const out=[]; const seen=new Set(); for(const item of items){ const key=keyFn(item); if(seen.has(key)) continue; seen.add(key); out.push(item); } return out; };
            if(syntheticCall&&typeof syntheticCall==="object"){ const n=typeof syntheticCall.name==="string"?syntheticCall.name.trim():""; const mapped=resolveAllowedName(n); if(!mapped){ syntheticCall=null; }else{ syntheticCall={ id:typeof syntheticCall.id==="string"&&syntheticCall.id?syntheticCall.id:"call_1", name:mapped, arguments:asArgs(syntheticCall.arguments) }; }} if(!syntheticCall&&allowedNames.length===1){ const fallbackName=allowedNames[0]; const shortQuery=String(lastUserText||"").toLowerCase().replace(/[^a-z0-9\\s]/g," ").split(/\\s+/).filter(Boolean).slice(0,8).join(" "); const fallbackArgs={ content: shortQuery||lastUserText||"memory" }; if(/working[_\\s-]?memory/i.test(fallbackName)){ fallbackArgs.userID="LocalAgentMemory"; } syntheticCall={ id:"call_1", name:fallbackName, arguments:asArgs(fallbackArgs) }; }
            const collectCallsFromObject=(value)=>{ if(Array.isArray(value)){ const res=[]; for(const item of value){ res.push(...collectCallsFromObject(item)); } return dedupeByKey(res,(c)=>`${c.id}\u0000${c.name}\u0000${c.arguments}`); } if(!value||typeof value!=="object") return []; const obj=value; const out=[]; const appendList=(items)=>{ for(const call of normalizeCallList(items)){ out.push(call); } }; appendList(obj.tool_calls); appendList(obj.toolCalls); appendList(obj.function_calls); appendList(obj.functionCalls); appendList(obj.calls); appendCall(out,obj.tool_call); appendCall(out,obj.functionCall); appendCall(out,obj.function_call); if(obj.type==="tool_use"){ appendCall(out,obj); } if(typeof obj.name==="string"&&(Object.prototype.hasOwnProperty.call(obj,"arguments")||Object.prototype.hasOwnProperty.call(obj,"args"))){ appendCall(out,obj); } if(obj.message&&typeof obj.message==="object"){ appendList(obj.message.tool_calls); appendList(obj.message.function_calls); appendCall(out,obj.message.functionCall); appendCall(out,obj.message.function_call); } const appendCallsFromParts=(parts)=>{ const list=Array.isArray(parts)?parts:[]; for(const part of list){ if(!part||typeof part!=="object") continue; appendCall(out,part); appendCall(out,part.functionCall); appendCall(out,part.function_call); } }; if(obj.content&&typeof obj.content==="object"){ appendCallsFromParts(obj.content.parts); } const candidates=Array.isArray(obj.candidates)?obj.candidates:[]; for(const candidate of candidates){ if(!candidate||typeof candidate!=="object") continue; if(candidate.content&&typeof candidate.content==="object"){ appendCallsFromParts(candidate.content.parts); } } return dedupeByKey(out,(c)=>`${c.id}\u0000${c.name}\u0000${c.arguments}`); };
            const isSyntheticText=(value)=>{ const t=String(value??"").trim().toLowerCase().replace(/\s+/g," "); return t==="<assistant reply>"||t==="[assistant reply]"||t==="assistant reply"||t==="reply to the user directly."||t==="__example_final_answer__"||t==="provide your actual helpful response here."; };
            const collectTextChunks=(value)=>{ const out=[]; if(Array.isArray(value)){ for(const item of value){ out.push(...collectTextChunks(item)); } return out; } const push=(v)=>{ if(typeof v!=="string") return; const t=v.trim(); if(t&&!isSyntheticText(t)) out.push(t); }; if(typeof value==="string"){ push(value); return out; } if(!value||typeof value!=="object") return out; const obj=value; push(obj.output_text); push(obj.text); push(obj.response); push(obj.content); if(obj.message&&typeof obj.message==="object"){ push(obj.message.content); push(obj.message.text); } if(Array.isArray(obj.candidates)){ for(const candidate of obj.candidates){ if(!candidate||typeof candidate!=="object") continue; if(candidate.content&&typeof candidate.content==="object"&&Array.isArray(candidate.content.parts)){ for(const part of candidate.content.parts){ if(!part||typeof part!=="object") continue; push(part.text); push(part.content); } } } } return out; };
            process.stdin.on("data",c=>d+=c).on("end",()=>{ const t=d.trim(); if(!t){ process.stdout.write(JSON.stringify({output_text:"",finish_reason:"stop"})); return; } const lines=t.split(/\r?\n/).map(line=>line.trim()).filter(Boolean); const toolCalls=[]; const textChunks=[]; let parsedAny=false; for(const line of lines){ let parsed=null; try{ parsed=JSON.parse(line); parsedAny=true; }catch{ continue; } for(const call of collectCallsFromObject(parsed)){ toolCalls.push(call); } for(const chunk of collectTextChunks(parsed)){ textChunks.push(chunk); } } const outputText=[...new Set(textChunks)].join("\n").trim(); const fallbackText=parsedAny?"":t; const uniqueCalls=[]; const seen=new Set(); for(const call of toolCalls){ const key=`${call.id}\u0000${call.name}\u0000${call.arguments}`; if(seen.has(key)) continue; seen.add(key); uniqueCalls.push(call); } const userAskedTool=/\b(use|call|invoke|run|search|find|look|query|check|health|build|deploy|remote)\b/.test(lastUserText.toLowerCase()); if(hasTools&&uniqueCalls.length>0){ process.stdout.write(JSON.stringify({output_text:outputText,tool_calls:uniqueCalls,finish_reason:"tool_calls"})); return; } if(hasTools&&!hasToolContext&&syntheticCall&&userAskedTool){ process.stdout.write(JSON.stringify({output_text:outputText,tool_calls:[syntheticCall],finish_reason:"tool_calls"})); return; } process.stdout.write(JSON.stringify({output_text:outputText||fallbackText,finish_reason:"stop"})); });
          ' "$HAS_TOOLS" "$ALLOWED_TOOL_NAMES_JSON" "$LAST_USER_TEXT" "$HAS_TOOL_CONTEXT" "$SYNTHETIC_TOOL_CALL_JSON"
      input: request_json_stdin
      output: json_contract
      timeoutMs: 240000
    auth:
      loginCommand:
        executable: sh
        args:
          - -c
          - |
            echo "Kimi CLI login is interactive in this version."
            echo "Run in a TTY shell: kimi"
            echo "Then run: /setup and complete auth."
            exit 1
        timeoutMs: 900000
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            if [ -f "$HOME/.kimi/config.toml" ] || [ -f "$HOME/.kimi/config.json" ]; then
              echo '{"ok":true,"source":"~/.kimi/config.toml"}'
              exit 0
            fi
            echo '{"ok":false,"error":"missing ~/.kimi/config.toml or ~/.kimi/config.json (run kimi then /setup)"}'
            exit 1
        timeoutMs: 30000

  - id: deepseek-api
    type: openai
    description: DeepSeek API - excellent for coding tasks with free tier
    baseUrl: https://api.deepseek.com
    apiKeyEnv: DEEPSEEK_API_KEY
    timeoutMs: 120000
    models:
      - id: deepseek-chat
        providerModel: deepseek-chat
        fallbackModels:
          - deepseek-reasoner
      - id: deepseek-reasoner
        providerModel: deepseek-reasoner
        fallbackModels:
          - deepseek-chat

  # ============================================================================
  # FREE IMAGE & MULTIMODAL SERVICES
  # ============================================================================

  - id: pollinations-image
    type: cli
    description: Free image generation via Pollinations AI (no API key needed)
    models:
      - id: pollinations-flux
        providerModel: flux
      - id: pollinations-turbo
        providerModel: turbo
    responseCommand:
      executable: sh
      args:
        - -c
        - |
          set -e
          # Create temp directory for image
          TMP_DIR=$(mktemp -d)
          trap "rm -rf $TMP_DIR" EXIT
          
          # URL encode the prompt
          PROMPT_ENCODED=$(echo "{{prompt}}" | sed 's/ /%20/g; s/"/%22/g; s/#/%23/g; s/&/%26/g')
          SEED=$((RANDOM % 999999))
          IMAGE_URL="https://image.pollinations.ai/prompt/${PROMPT_ENCODED}?seed=${SEED}&width=1024&height=1024&nologo=true&model={{provider_model}}"
          
          # Download image
          curl -sL "$IMAGE_URL" -o "$TMP_DIR/image.png"
          
          # Convert to base64 and output as JSON
          B64=$(base64 -w 0 "$TMP_DIR/image.png" 2>/dev/null || base64 "$TMP_DIR/image.png" | tr -d '\n')
          echo "{\"data\":[{\"b64_json\":\"${B64}\"}]}"
      input: prompt_stdin
      output: json_contract
      timeoutMs: 120000

  - id: huggingface-image
    type: cli
    description: Free image generation via Hugging Face Inference API
    models:
      - id: hf-stable-diffusion-xl
        providerModel: stabilityai/stable-diffusion-xl-base-1.0
      - id: hf-playground-v2.5
        providerModel: playgroundai/playground-v2.5-1024px-aesthetic
      - id: hf-flux-schnell
        providerModel: black-forest-labs/FLUX.1-schnell
    responseCommand:
      executable: sh
      args:
        - -c
        - |
          set -e
          TMP_DIR=$(mktemp -d)
          trap "rm -rf $TMP_DIR" EXIT
          
          # Generate image via Hugging Face API
          curl -s -X POST "https://api-inference.huggingface.co/models/{{provider_model}}" \
            -H "Authorization: Bearer $HF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"inputs\": \"{{prompt}}\"}" \
            -o "$TMP_DIR/image.png"
          
          # Check if we got valid image
          if file "$TMP_DIR/image.png" | grep -q "image"; then
            B64=$(base64 -w 0 "$TMP_DIR/image.png" 2>/dev/null || base64 "$TMP_DIR/image.png" | tr -d '\n')
            echo "{\"data\":[{\"b64_json\":\"${B64}\"}]}"
          else
            # May be loading or error
            cat "$TMP_DIR/image.png"
            exit 1
          fi
      input: prompt_stdin
      output: json_contract
      timeoutMs: 180000
    auth:
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            if [ -z "$HF_API_TOKEN" ]; then
              echo '{"ok":false,"error":"HF_API_TOKEN not set"}'
              exit 1
            fi
            curl -s -o /dev/null -w "%{http_code}" \
              https://api-inference.huggingface.co/models/gpt2 \
              -H "Authorization: Bearer $HF_API_TOKEN" | grep -q "200" && \
              echo '{"ok":true}' || echo '{"ok":false,"error":"Check token"}'
        timeoutMs: 15000

  - id: huggingface-whisper
    type: cli
    description: Free speech-to-text via Hugging Face Whisper
    models:
      - id: hf-whisper-large
        providerModel: openai/whisper-large-v3
      - id: hf-whisper-base
        providerModel: openai/whisper-base
    responseCommand:
      executable: sh
      args:
        - -c
        - |
          # Expects audio file path in prompt
          curl -s https://api-inference.huggingface.co/models/{{provider_model}} \
            -H "Authorization: Bearer $HF_API_TOKEN" \
            --data-binary "@{{prompt}}" | \
            sed 's/.*"text":"\([^"]*\)".*/\1/'
      input: prompt_stdin
      output: text_plain
      timeoutMs: 120000
    auth:
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            [ -z "$HF_API_TOKEN" ] && echo '{"ok":false}' || echo '{"ok":true}'
        timeoutMs: 5000

  - id: gemini-flash-free
    type: cli
    description: Gemini Flash via Google AI Studio (generous free tier)
    models:
      - id: gemini-3-flash-preview
        providerModel: gemini-3-flash-preview
      - id: gemini-3.1-flash-lite-preview
        providerModel: gemini-3.1-flash-lite-preview
      - id: gemini-2.5-flash
        providerModel: gemini-2.5-flash
      - id: gemini-2.5-flash-lite
        providerModel: gemini-2.5-flash-lite
    responseCommand:
      executable: curl
      args:
        - -s
        - "https://generativelanguage.googleapis.com/v1beta/models/{{provider_model}}:generateContent"
        - -H
        - "Content-Type: application/json"
        - -H
        - "x-goog-api-key: $GEMINI_API_KEY"
        - -d
        - |
          {
            "contents": [{"parts":[{"text":"{{prompt}}"}]}],
            "generationConfig": {"temperature":0.7,"maxOutputTokens":2048}
          }
      input: prompt_stdin
      output: text_contract_final_line
      timeoutMs: 60000
    auth:
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            if [ -z "$GEMINI_API_KEY" ]; then
              echo '{"ok":false,"error":"GEMINI_API_KEY not set"}'
              exit 1
            fi
            curl -s -o /dev/null -w "%{http_code}" \
              "https://generativelanguage.googleapis.com/v1beta/models?key=$GEMINI_API_KEY" | grep -q "200" && \
              echo '{"ok":true}' || echo '{"ok":false,"error":"Invalid API key"}'
        timeoutMs: 10000

  # ============================================================================
  # FREE AUDIO SERVICES (Speech-to-Text & Text-to-Speech)
  # ============================================================================

  - id: groq-whisper
    type: cli
    description: Fast speech-to-text via Groq (Whisper API) - generous free tier
    models:
      - id: groq-whisper-large-v3
        providerModel: whisper-large-v3
      - id: groq-whisper-v3-turbo
        providerModel: whisper-v3-turbo
    responseCommand:
      executable: sh
      args:
        - -c
        - |
          set -e
          # Expects audio file path in prompt
          AUDIO_FILE="{{prompt}}"
          if [ ! -f "$AUDIO_FILE" ]; then
            echo '{"text":"Error: Audio file not found"}'
            exit 1
          fi
          
          curl -s https://api.groq.com/openai/v1/audio/transcriptions \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -F file="@$AUDIO_FILE" \
            -F model="{{provider_model}}" \
            -F response_format=json
      input: prompt_stdin
      output: text_contract_final_line
      timeoutMs: 120000
    auth:
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            if [ -z "$GROQ_API_KEY" ]; then
              echo '{"ok":false,"error":"GROQ_API_KEY not set"}'
              exit 1
            fi
            curl -s -o /dev/null -w "%{http_code}" \
              https://api.groq.com/openai/v1/models \
              -H "Authorization: Bearer $GROQ_API_KEY" | grep -q "200" && \
              echo '{"ok":true}' || echo '{"ok":false,"error":"Invalid API key"}'
        timeoutMs: 10000

  - id: huggingface-tts
    type: cli
    description: Free text-to-speech via Hugging Face (speecht5, bark, etc)
    models:
      - id: hf-speecht5-tts
        providerModel: microsoft/speecht5_tts
      - id: hf-bark
        providerModel: suno/bark
      - id: hf-fastspeech2
        providerModel: facebook/fastspeech2-en-ljspeech
    responseCommand:
      executable: sh
      args:
        - -c
        - |
          set -e
          TMP_DIR=$(mktemp -d)
          trap "rm -rf $TMP_DIR" EXIT
          
          # Call Hugging Face Inference API for TTS
          curl -s -X POST "https://api-inference.huggingface.co/models/{{provider_model}}" \
            -H "Authorization: Bearer $HF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"inputs\": \"{{prompt}}\"}" \
            -o "$TMP_DIR/audio.wav"
          
          # Check if we got valid audio
          if file "$TMP_DIR/audio.wav" | grep -q "audio\|WAVE\|RIF"; then
            B64=$(base64 -w 0 "$TMP_DIR/audio.wav" 2>/dev/null || base64 "$TMP_DIR/audio.wav" | tr -d '\n')
            echo "{\"audio\":\"${B64}\",\"format\":\"wav\"}"
          else
            # May be loading or error - output as text
            cat "$TMP_DIR/audio.wav"
            exit 1
          fi
      input: prompt_stdin
      output: json_contract
      timeoutMs: 180000
    auth:
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            if [ -z "$HF_API_TOKEN" ]; then
              echo '{"ok":false,"error":"HF_API_TOKEN not set"}'
              exit 1
            fi
            curl -s -o /dev/null -w "%{http_code}" \
              https://api-inference.huggingface.co/models/gpt2 \
              -H "Authorization: Bearer $HF_API_TOKEN" | grep -q "200" && \
              echo '{"ok":true}' || echo '{"ok":false,"error":"Check token"}'
        timeoutMs: 15000

  - id: piper-tts-local
    type: cli
    description: Local text-to-speech via Piper (privacy-friendly, runs offline)
    models:
      - id: piper-en-us
        providerModel: en_US-lessac-medium
      - id: piper-en-gb
        providerModel: en_GB-alan-medium
      - id: piper-de-de
        providerModel: de_DE-thorsten-medium
    responseCommand:
      executable: sh
      args:
        - -c
        - |
          set -e
          TMP_DIR=$(mktemp -d)
          trap "rm -rf $TMP_DIR" EXIT
          
          MODEL_FILE="$HOME/.local/share/piper/{{provider_model}}.onnx"
          
          # Check if model exists, if not suggest download
          if [ ! -f "$MODEL_FILE" ]; then
            echo "{\"error\":\"Model not found. Install with: piper-download --model {{provider_model}}\"}"
            exit 1
          fi
          
          # Generate audio
          echo "{{prompt}}" | piper --model "$MODEL_FILE" --output_file "$TMP_DIR/audio.wav"
          
          # Convert to base64
          B64=$(base64 -w 0 "$TMP_DIR/audio.wav" 2>/dev/null || base64 "$TMP_DIR/audio.wav" | tr -d '\n')
          echo "{\"audio\":\"${B64}\",\"format\":\"wav\"}"
      input: prompt_stdin
      output: json_contract
      timeoutMs: 60000

  - id: gemini-audio
    type: cli
    description: Gemini Flash audio understanding (multimodal audio input)
    models:
      - id: gemini-audio-flash
        providerModel: gemini-2.5-flash
    responseCommand:
      executable: sh
      args:
        - -c
        - |
          set -e
          # Expects base64-encoded audio in prompt with format "data:audio/mp3;base64,..."
          AUDIO_DATA="{{prompt}}"
          
          # Extract mime type and base64 data
          MIME_TYPE=$(echo "$AUDIO_DATA" | sed 's/data:\([^;]*\);base64,.*/\1/')
          B64_DATA=$(echo "$AUDIO_DATA" | sed 's/data:[^;]*;base64,//')
          
          curl -s "https://generativelanguage.googleapis.com/v1beta/models/{{provider_model}}:generateContent" \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d "{
              \"contents\": [{
                \"parts\": [
                  {\"inline_data\": {\"mime_type\": \"$MIME_TYPE\", \"data\": \"$B64_DATA\"}},
                  {\"text\": \"Transcribe this audio\"}
                ]
              }]
            }" | jq -r '.candidates[0].content.parts[0].text // "Error processing audio"'
      input: prompt_stdin
      output: text_plain
      timeoutMs: 120000
    auth:
      statusCommand:
        executable: sh
        args:
          - -c
          - |
            if [ -z "$GEMINI_API_KEY" ]; then
              echo '{"ok":false,"error":"GEMINI_API_KEY not set"}'
              exit 1
            fi
            curl -s -o /dev/null -w "%{http_code}" \
              "https://generativelanguage.googleapis.com/v1beta/models?key=$GEMINI_API_KEY" | grep -q "200" && \
              echo '{"ok":true}' || echo '{"ok":false,"error":"Invalid API key"}'
        timeoutMs: 10000
