            RAW_OUTPUT="$(kimi --config-file "$KIMI_CONFIG_FILE" --print --model "{{provider_model}}" --output-format=stream-json --prompt "$PROMPT")" || exit $?
          else
            RAW_OUTPUT="$(kimi --print --model "{{provider_model}}" --output-format=stream-json --prompt "$PROMPT")" || exit $?
          fi
          printf "%s" "$RAW_OUTPUT" | node -e '
            let d="";
            const hasTools=process.argv[1]==="1";
            let allowedNames=[];
            try{
              const parsedAllowed=JSON.parse(process.argv[2]||"[]");
              if(Array.isArray(parsedAllowed)){
                allowedNames=parsedAllowed.filter(v=>typeof v==="string"&&v.trim()).map(v=>v.trim());
              }
            }catch{}
            const lastUserText=String(process.argv[3]||"");
            const hasToolContext=process.argv[4]==="1";
            let syntheticCall=null;
            try{
