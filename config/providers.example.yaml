providers:
  - id: gemini-cli
    type: cli
    description: Gemini via OpenCode + Google OAuth plugin
    models:
      - id: gemini-3.1-pro-preview
        providerModel: google/gemini-3.1-pro-preview
        fallbackModels:
          - gemini-3-flash-preview
          - gpt-5.4
      - id: gemini-3-flash-preview
        providerModel: google/gemini-3-flash-preview
        fallbackModels:
          - gemini-3.1-pro-preview
          - gpt-5.4
      - id: gemini-3.1-flash-lite-preview
        providerModel: google/gemini-3.1-flash-lite-preview
        fallbackModels:
          - gemini-3-flash-preview
      - id: gemini-2.5-pro
        providerModel: google/gemini-2.5-pro
        fallbackModels:
          - gemini-3.1-pro-preview
      - id: gemini-2.5-flash
        providerModel: google/gemini-2.5-flash
        fallbackModels:
          - gemini-3-flash-preview
    responseCommand:
      executable: opencode
      args:
        - run
        - --model
        - "{{provider_model}}"
        - --format
        - default
        - "{{prompt}}"
      input: prompt_stdin
      output: text
      timeoutMs: 240000
    auth:
      loginCommand:
        executable: opencode
        args:
          - auth
          - login
        timeoutMs: 900000
      statusCommand:
        executable: sh
        args:
          - -c
          - opencode auth list | grep -qi google
        timeoutMs: 30000
      # Example: Rate limit check command
      # This should output JSON with rate limit information
      # rateLimitCommand:
      #   executable: opencode
      #   args:
      #     - account
      #     - limits
      #     - --json
      #   timeoutMs: 30000

  - id: antigravity-cli
    type: cli
    description: Antigravity CLI adapter
    models:
      - id: antigravity-default
        providerModel: default
    responseCommand:
      executable: antigravity
      args:
        - chat
        - --model
        - "{{provider_model}}"
        - --json
      input: request_json_stdin
      output: json_contract
      timeoutMs: 240000
    auth:
      loginCommand:
        executable: antigravity
        args:
          - auth
          - login
          - --no-browser
        timeoutMs: 900000
      statusCommand:
        executable: antigravity
        args:
          - auth
          - status
          - --json
        timeoutMs: 30000

  - id: codex-cli
    type: cli
    description: OpenAI Codex app-server bridge adapter
    models:
      - id: codex-latest
        providerModel: codex-latest
        fallbackModels:
          - gpt-5.4
          - gemini-3.1-pro-preview
      - id: gpt-5.4
        providerModel: gpt-5.4
        fallbackModels:
          - gpt-5.4-pro
          - gemini-3.1-pro-preview
      - id: gpt-5.4-pro
        providerModel: gpt-5.4-pro
        fallbackModels:
          - gpt-5.4
          - gemini-3.1-pro-preview
      - id: gpt-5.3-instant
        providerModel: gpt-5.3-instant
        fallbackModels:
          - gpt-5.4
      - id: gpt-4.1
        providerModel: gpt-4.1
        fallbackModels:
          - gpt-5.3-instant
    responseCommand:
      executable: node
      args:
        - dist/scripts/codex-appserver-bridge.js
        - --model
        - "{{provider_model}}"
      input: request_json_stdin
      output: json_contract
      timeoutMs: 240000
    auth:
      loginCommand:
        executable: codex
        args:
          - login
          - --no-browser
        timeoutMs: 900000
      statusCommand:
        executable: codex
        args:
          - whoami
          - --json
        timeoutMs: 30000
      # Example: OpenAI rate limit check
      # This would call the OpenAI API to check usage/limits
      # rateLimitCommand:
      #   executable: sh
      #   args:
      #     - -c
      #     - |
      #       curl -s https://api.openai.com/v1/dashboard/billing/credit_grants \
      #         -H "Authorization: Bearer $OPENAI_API_KEY" \
      #         -H "Content-Type: application/json" | \
      #         jq '{limitType: "credits", remaining: .total_available, maxAllowed: .total_granted}'
      #   timeoutMs: 30000

  # ============================================================================
  # FREE AI SERVICES
  # ============================================================================

  - id: ollama-local
    type: cli
    description: Local LLMs via Ollama (completely free, runs locally)
    models:
      - id: llama3.2
        providerModel: llama3.2
        fallbackModels:
          - mistral
      - id: mistral
        providerModel: mistral
        fallbackModels:
          - codellama
      - id: codellama
        providerModel: codellama
        fallbackModels:
          - llama3.2
      - id: phi4
        providerModel: phi4
      - id: qwen2.5
        providerModel: qwen2.5
    responseCommand:
      executable: ollama
      args:
        - run
        - "{{provider_model}}"
      input: prompt_stdin
      output: text_plain
      timeoutMs: 300000
    # No auth needed for local Ollama

  - id: groq-api
    type: openai
    description: Groq API - auto-discovers chat-usable models at startup
    baseUrl: https://api.groq.com/openai/v1
    apiKeyEnv: GROQ_API_KEY
    timeoutMs: 60000
    discovery:
      enabled: true
      # Override the default chat filter if you want specific models only.
      # include:
      #   - groq/compound*
      #   - llama-3.1-8b-instant
      #   - llama-3.3-70b-versatile
      #   - openai/gpt-oss-*
      #   - meta-llama/llama-4-scout-17b-16e-instruct
      #   - qwen/qwen3-32b
      # exclude:
      #   - "*guard*"
    models:
      # Optional overrides for fallback chains or custom aliases.
      # If providerModel matches a discovered Groq model, this entry wins.
      - id: groq/compound
        providerModel: groq/compound
        fallbackModels:
          - openai/gpt-oss-20b
          - llama-3.3-70b-versatile
      - id: groq/compound-mini
        providerModel: groq/compound-mini
        fallbackModels:
          - openai/gpt-oss-20b
      - id: openai/gpt-oss-120b
        providerModel: openai/gpt-oss-120b
        fallbackModels:
          - openai/gpt-oss-20b
      - id: openai/gpt-oss-20b
        providerModel: openai/gpt-oss-20b
        fallbackModels:
          - llama-3.1-8b-instant
      - id: llama-3.3-70b-versatile
        providerModel: llama-3.3-70b-versatile
      - id: llama-3.1-8b-instant
        providerModel: llama-3.1-8b-instant

  - id: kimi-code-cli
    type: cli
    description: Kimi Code CLI adapter
    models:
      - id: kimi-for-coding
        providerModel: kimi-for-coding
      - id: kimi-k2-turbo-preview
        providerModel: kimi-for-coding
    responseCommand:
      executable: sh
      args:
        - -lc
        - |
          REQUEST_JSON="$(cat)"
          HAS_TOOLS="$(
            printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const tools=Array.isArray(req.tools)?req.tools:[];process.stdout.write(tools.length>0?"1":"0");}catch{process.stdout.write("0");}});'
          )"
          ALLOWED_TOOL_NAMES_JSON="$(
            printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const tools=Array.isArray(req.tools)?req.tools:[];const names=[];for(const item of tools){if(!item||typeof item!=="object") continue;const fn=item.function&&typeof item.function==="object"?item.function:null;const name=fn&&typeof fn.name==="string"?fn.name.trim():"";if(name) names.push(name);}process.stdout.write(JSON.stringify(names));}catch{process.stdout.write("[]");}});'
          )"
          LAST_USER_TEXT="$(
            printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const msgs=Array.isArray(req.messages)?req.messages:[];for(let i=msgs.length-1;i>=0;i--){const m=msgs[i];if(!m||typeof m!=="object") continue;if(String(m.role||"")==="user"){const c=typeof m.content==="string"?m.content:(m&&Object.prototype.hasOwnProperty.call(m,"content")?JSON.stringify(m.content??""):"");process.stdout.write(c||"");return;}}process.stdout.write("");}catch{process.stdout.write("");}});'
          )"
          HAS_TOOL_CONTEXT="$(
            printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const msgs=Array.isArray(req.messages)?req.messages:[];const hasToolContext=msgs.some(m=>{if(!m||typeof m!=="object") return false;if(String(m.role||"")==="tool") return true;if(typeof m.tool_call_id==="string"&&m.tool_call_id.trim()) return true;const c=typeof m.content==="string"?m.content:(m&&Object.prototype.hasOwnProperty.call(m,"content")?JSON.stringify(m.content??""):"");return typeof c==="string"&&c.includes("TOOL_CALLS:");});process.stdout.write(hasToolContext?"1":"0");}catch{process.stdout.write("0");}});'
          )"
          SYNTHETIC_TOOL_CALL_JSON="$(
            printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const tools=Array.isArray(req.tools)?req.tools:[];if(tools.length!==1){process.stdout.write("null");return;}const item=tools[0];if(!item||typeof item!=="object"){process.stdout.write("null");return;}const fn=item.function&&typeof item.function==="object"?item.function:null;const name=fn&&typeof fn.name==="string"?fn.name.trim():"";if(!name){process.stdout.write("null");return;}const description=typeof fn.description==="string"?fn.description:"";const params=fn&&fn.parameters&&typeof fn.parameters==="object"?fn.parameters:{};const props=params&&params.properties&&typeof params.properties==="object"?params.properties:{};const required=Array.isArray(params.required)?params.required.filter(x=>typeof x==="string"):[];const msgs=Array.isArray(req.messages)?req.messages:[];let userText="";for(let i=msgs.length-1;i>=0;i--){const m=msgs[i];if(!m||typeof m!=="object") continue;if(String(m.role||"")==="user"){userText=typeof m.content==="string"?m.content:JSON.stringify(m.content??"");break;}}const words=String(userText||"").toLowerCase().replace(/[^a-z0-9\s]/g," ").split(/\s+/).filter(Boolean).slice(0,8).join(" ");const session=(description.match(/sessionid\s*(?:is|=|:)\s*"([^"]+)"/i)||[])[1]||"LocalAgentMemory";const out={};const setArg=(key)=>{const lower=String(key||"").toLowerCase();if(/user|userid|session|account|tenant/.test(lower)){out[key]=session;return;}if(/content|query|search|keyword|text|prompt|message|input/.test(lower)){out[key]=words||userText||"memory";return;}out[key]="";};for(const key of required){setArg(key);}if(required.length===0){if(Object.prototype.hasOwnProperty.call(props,"userID")) out.userID=session;if(Object.prototype.hasOwnProperty.call(props,"content")) out.content=words||userText||"memory";}process.stdout.write(JSON.stringify({id:"call_1",name,arguments:out}));}catch{process.stdout.write("null");}});'
          )"
          PROMPT="$(
            printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{const req=JSON.parse(d);const msgs=Array.isArray(req.messages)?req.messages:[];const tools=Array.isArray(req.tools)?req.tools:[];const metadata=req&&typeof req.metadata==="object"&&req.metadata?req.metadata:{};const toolChoice=metadata&&typeof metadata.tool_choice==="object"&&metadata.tool_choice?metadata.tool_choice:{};const forcedToolName=toolChoice&&toolChoice.type==="function"&&toolChoice.function&&typeof toolChoice.function==="object"&&typeof toolChoice.function.name==="string"?String(toolChoice.function.name).trim():"";const norm=v=>typeof v==="string"?v:JSON.stringify(v??"");const msgText=typeof req.prompt==="string"&&req.prompt.trim()?req.prompt:msgs.map(m=>{const role=String(m&&m.role?m.role:"user").toUpperCase();const name=m&&typeof m==="object"&&typeof m.name==="string"&&m.name?` (${m.name})`:"";const tcid=m&&typeof m==="object"&&typeof m.tool_call_id==="string"&&m.tool_call_id?` [tool_call_id=${m.tool_call_id}]`:"";return `${role}${name}${tcid}:\n${norm(m&&Object.prototype.hasOwnProperty.call(m,"content")?m.content:"")}`;}).join("\n\n");const toolCatalog=tools.map(item=>{if(!item||typeof item!=="object") return null;const fn=item.function&&typeof item.function==="object"?item.function:null;const name=fn&&typeof fn.name==="string"?fn.name.trim():"";if(!name) return null;const description=typeof fn.description==="string"&&fn.description.trim()?fn.description.trim():"Tool exposed by AVAILABLE_TOOLS_JSON.";const parameters=Object.prototype.hasOwnProperty.call(fn,"parameters")?fn.parameters:{type:"object",additionalProperties:true};return {name,description,parameters};}).filter(Boolean);const toolJson=JSON.stringify(tools,null,2);const toolCatalogJson=JSON.stringify(toolCatalog,null,2);const toolNames=toolCatalog.map(t=>t.name).join(", ");const instruction=["You are connected through an OpenAI-compatible gateway.","The tools listed in AVAILABLE_TOOLS_JSO