name: Build Ollama Upstream Image

on:
  push:
    branches: [ main ]
    paths:
      - .github/workflows/build-ollama-upstream.yml
  workflow_dispatch:
    inputs:
      ollama_ref:
        description: Upstream ollama/ollama ref to build
        required: false
        default: main
      platforms:
        description: Docker target platforms
        required: false
        default: linux/amd64,linux/arm64

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ollama-upstream

jobs:
  build:
    name: Build and Push Ollama Upstream
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Checkout upstream Ollama source
        uses: actions/checkout@v4
        with:
          repository: ollama/ollama
          ref: ${{ github.event.inputs.ollama_ref || 'main' }}
          path: vendor/ollama-upstream
          fetch-depth: 1

      - name: Record upstream revision
        id: upstream
        run: |
          echo "sha=$(git -C vendor/ollama-upstream rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git -C vendor/ollama-upstream rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=raw,value=sha-${{ steps.upstream.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Custom Ollama image built from ollama/ollama upstream
            org.opencontainers.image.revision=${{ steps.upstream.outputs.sha }}

      - name: Build and push upstream Ollama image
        uses: docker/build-push-action@v6
        with:
          context: vendor/ollama-upstream
          file: vendor/ollama-upstream/Dockerfile
          push: true
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}
          build-args: |
            FLAVOR=cpu
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ollama-upstream
          cache-to: type=gha,mode=max,scope=ollama-upstream
