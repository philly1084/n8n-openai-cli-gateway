apiVersion: v1
kind: Namespace
metadata:
  name: n8n-openai-gateway
  labels:
    app.kubernetes.io/name: n8n-openai-cli-gateway
---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-openai-cli-gateway-secrets
  namespace: n8n-openai-gateway
type: Opaque
stringData:
  n8nApiKey: "replace-with-long-random-n8n-key"
  adminApiKey: "replace-with-long-random-admin-key"
  groqApiKey: "replace-with-groq-api-key"
  deepseekApiKey: "replace-with-deepseek-api-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: n8n-openai-gateway
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "replace-with-github-username",
          "password": "replace-with-github-token-read-packages"
        }
      }
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n-openai-cli-gateway
  namespace: n8n-openai-gateway
imagePullSecrets:
  - name: ghcr-secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-openai-cli-gateway-config
  namespace: n8n-openai-gateway
data:
  providers.yaml: |
    providers:
      - id: gemini-cli
        type: cli
        description: Gemini CLI adapter
        models:
          - id: gemini-3.1-pro-preview
            providerModel: gemini-3.1-pro-preview
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - gemini-3-flash-preview
          - id: gemini-3-flash-preview
            providerModel: gemini-3-flash-preview
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - gemini-3.1-pro-preview
          - id: gemini-3.1-flash-lite-preview
            providerModel: gemini-3.1-flash-lite-preview
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - gemini-3-flash-preview
          - id: gemini-2.5-pro
            providerModel: gemini-2.5-pro
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - gemini-3.1-pro-preview
          - id: gemini-2.5-flash
            providerModel: gemini-2.5-flash
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - gemini-3-flash-preview
        responseCommand:
          executable: node
          args:
            - dist/scripts/gemini-cli-bridge.js
            - --model
            - "{{provider_model}}"
          input: request_json_stdin
          output: json_contract
          timeoutMs: 240000
        auth:
          loginCommand:
            executable: sh
            args:
              - -c
              - |
                echo "Gemini CLI login is interactive in this version."
                echo "Run in a TTY shell: gemini"
                echo "Then run: /auth and choose Login with Google."
                exit 1
            timeoutMs: 900000
          statusCommand:
            executable: sh
            args:
              - -c
              - |
                test -f "$HOME/.gemini/oauth_creds.json" \
                  && echo '{"ok":true,"source":"oauth_creds.json"}' \
                  || (echo '{"ok":false,"error":"missing ~/.gemini/oauth_creds.json"}' && exit 1)
            timeoutMs: 30000

      - id: codex-cli
        type: cli
        description: OpenAI Codex app-server bridge adapter
        models:
          - id: codex-latest
            providerModel: codex-latest
            fallbackModels:
              - gpt-5.4
              - gemini-3.1-pro-preview
          - id: gpt-5.4
            providerModel: gpt-5.4
            fallbackModels:
              - gpt-5.4-pro
              - gemini-3.1-pro-preview
          - id: gpt-5.4-pro
            providerModel: gpt-5.4-pro
            fallbackModels:
              - gpt-5.4
              - gemini-3.1-pro-preview
          - id: gpt-5.3-instant
            providerModel: gpt-5.3-instant
            fallbackModels:
              - gpt-5.4
          - id: gpt-4.1
            providerModel: gpt-4.1
            fallbackModels:
              - gpt-5.3-instant
          - id: gpt-5.1-codex-mini
            providerModel: gpt-5.1-codex-mini
            fallbackModels:
              - gpt-5.4
        responseCommand:
          executable: node
          args:
            - dist/scripts/codex-appserver-bridge.js
            - --model
            - "{{provider_model}}"
          input: request_json_stdin
          output: json_contract
          timeoutMs: 240000
        auth:
          loginCommand:
            executable: codex
            args:
              - login
              - --no-browser
            timeoutMs: 900000
          statusCommand:
            executable: codex
            args:
              - whoami
              - --json
            timeoutMs: 30000

      - id: kimi-code-cli
        type: cli
        description: Kimi Code ACP bridge adapter
        models:
          - id: kimi-for-coding
            providerModel: kimi-for-coding
          - id: kimi-k2-turbo-preview
            providerModel: kimi-for-coding
        responseCommand:
          executable: node
          args:
            - dist/scripts/kimi-acp-bridge.js
            - --model
            - "{{provider_model}}"
          input: request_json_stdin
          output: json_contract
          timeoutMs: 240000
        auth:
          loginCommand:
            executable: sh
            args:
              - -c
              - |
                echo "Kimi CLI login is interactive."
                echo "Run in a TTY shell: kimi"
                echo "Then run: /login and complete auth."
                echo "If your installed minor version still uses /setup, use that instead."
                exit 1
            timeoutMs: 900000
          statusCommand:
            executable: sh
            args:
              - -c
              - |
                if [ -f "$HOME/.kimi/config.toml" ] || [ -f "$HOME/.kimi/config.json" ]; then
                  echo '{"ok":true,"source":"~/.kimi/config.toml"}'
                  exit 0
                fi
                echo '{"ok":false,"error":"missing ~/.kimi/config.toml or ~/.kimi/config.json (run kimi then /login, or /setup on older releases)"}'
                exit 1
            timeoutMs: 30000

      - id: ollama-gemma4-cpu
        type: cli
        description: Local Ollama CPU-focused Gemma stack with Gemma 4 E4B primary and smaller fallbacks
        models:
          - id: gemma4-e4b
            providerModel: gemma4:e4b
            fallbackModels:
              - gemma4-e2b
              - gemma3-1b
          - id: gemma4-e2b
            providerModel: gemma4:e2b
            fallbackModels:
              - gemma3-1b
          - id: gemma3-1b
            providerModel: gemma3:1b
        responseCommand:
          executable: node
          args:
            - dist/scripts/ollama-api-bridge.js
            - --model
            - "{{provider_model}}"
          env:
            OLLAMA_BASE_URL: http://ollama:11434/api
            OLLAMA_NUM_CTX: "8192"
            OLLAMA_KEEP_ALIVE: "30m"
            OLLAMA_HTTP_TIMEOUT_MS: "540000"
          input: request_json_stdin
          output: json_contract
          timeoutMs: 600000

      - id: groq-api
        type: cli
        description: Groq API via curl using Groq production chat models
        models:
          - id: groq/compound
            providerModel: groq/compound
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - openai/gpt-oss-20b
          - id: groq/compound-mini
            providerModel: groq/compound-mini
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - openai/gpt-oss-20b
          - id: openai/gpt-oss-120b
            providerModel: openai/gpt-oss-120b
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - openai/gpt-oss-20b
          - id: openai/gpt-oss-20b
            providerModel: openai/gpt-oss-20b
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - llama-3.1-8b-instant
          - id: llama-3.3-70b-versatile
            providerModel: llama-3.3-70b-versatile
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
          - id: llama-3.1-8b-instant
            providerModel: llama-3.1-8b-instant
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
        responseCommand:
          executable: sh
          args:
            - -lc
            - |
              REQUEST_JSON="$(cat)"
              HAS_TOOLS="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const tools=Array.isArray(req.tools)?req.tools:[];process.stdout.write(tools.length>0?"1":"0");}catch{process.stdout.write("0");}});'
              )"
              if [ "$HAS_TOOLS" = "1" ]; then
                echo "Groq CLI provider does not reliably support gateway-managed tool turns. Retry with fallback." >&2
                exit 86
              fi
              PAYLOAD="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";const maxChars=Number(process.env.GROQ_MAX_PROMPT_CHARS||120000);const model="{{provider_model}}";const suppressLocalToolCalling=/^groq\/compound(?:-mini)?$/i.test(model);const dedupe=parts=>{const out=[];const seen=new Set();for(const part of parts){const trimmed=String(part??"").trim();if(!trimmed||seen.has(trimmed)) continue;seen.add(trimmed);out.push(trimmed);}return out;};const collectText=(value,depth=0,seen=new WeakSet())=>{if(depth>8||value===null||value===undefined) return [];if(typeof value==="string") return value.trim()?[value.trim()]:[];if(Array.isArray(value)) return dedupe(value.flatMap(item=>collectText(item,depth+1,seen)));if(typeof value!=="object") return [];if(seen.has(value)) return [];seen.add(value);return dedupe([value.text,value.input_text,value.output_text,value.content,value.value].flatMap(item=>collectText(item,depth+1,seen)));};const extractText=value=>collectText(value).join("\n").trim();const normalizeContent=value=>{const text=extractText(value);if(text) return text;if(value===null||value===undefined) return "";try{return JSON.stringify(value);}catch{return String(value);}};const stripAssistantToolContext=value=>{const text=normalizeContent(value).trim();const marker="\n\nTOOL_CALLS:\n";const fallback="TOOL_CALLS:\n";const markerIndex=text.indexOf(marker);if(markerIndex>=0)return text.slice(0,markerIndex).trim();const fallbackIndex=text.indexOf(fallback);if(fallbackIndex>=0)return text.slice(0,fallbackIndex).trim();return text;};process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const rawMsgs=Array.isArray(req.messages)?req.messages:[];const allowedRoles=new Set(["system","user","assistant","tool"]);const msgs=rawMsgs.map(m=>{const role=allowedRoles.has(String(m&&m.role||""))?String(m.role):"user";const rawValue=m&&Object.prototype.hasOwnProperty.call(m,"content")?m.content:"";const rawContent=normalizeContent(rawValue);const content=suppressLocalToolCalling&&role==="assistant"?stripAssistantToolContext(rawContent):rawContent.trim();if(!content)return null;if(suppressLocalToolCalling&&role==="tool"){return {role:"user",content:`Context from a previous tool result:\n${content}`};}const out={role,content};if(!suppressLocalToolCalling&&role==="tool"&&m&&typeof m==="object"&&typeof m.tool_call_id==="string"&&m.tool_call_id){out.tool_call_id=m.tool_call_id;}if(!suppressLocalToolCalling&&role==="assistant"&&m&&typeof m==="object"&&Array.isArray(m.tool_calls)&&m.tool_calls.length>0){out.tool_calls=m.tool_calls;}return out;}).filter(Boolean);let total=0;const kept=[];for(let i=msgs.length-1;i>=0;i--){const msg=msgs[i];const cost=msg.content.length+msg.role.length+32;if(kept.length>0&&total+cost>maxChars) continue;kept.unshift(msg);total+=cost;}const firstSystem=msgs.find(m=>m.role==="system");if(firstSystem&&!kept.some(m=>m.role==="system")&&(total+firstSystem.content.length+32)<=maxChars){kept.unshift(firstSystem);total+=firstSystem.content.length+32;}if(kept.length===0){const fallback=(typeof req.prompt==="string"?req.prompt:normalizeContent(req.prompt)).trim();kept.push({role:"user",content:fallback.slice(-maxChars)||"Hello"});}process.stdout.write(JSON.stringify({model,messages:kept,stream:false}));}catch{process.stdout.write(JSON.stringify({model,messages:[{role:"user",content:"Hello"}],stream:false}));}});'
              )"
              printf "%s" "$PAYLOAD" | curl -fsS https://api.groq.com/openai/v1/chat/completions \
                -H "Authorization: Bearer $GROQ_API_KEY" \
                -H "Content-Type: application/json" \
                --data-binary @- | \
                node -e 'let d="";const invalidFragments=["final answer could not be synthesized from the model response","could not be synthesized from the model response"];const normalize=v=>String(v??"").trim().toLowerCase().replace(/\s+/g," ");const dedupe=parts=>{const out=[];const seen=new Set();for(const part of parts){const trimmed=String(part??"").trim();if(!trimmed||seen.has(trimmed)) continue;seen.add(trimmed);out.push(trimmed);}return out;};const collectText=(value,depth=0,seen=new WeakSet())=>{if(depth>8||value===null||value===undefined) return [];if(typeof value==="string") return value.trim()?[value.trim()]:[];if(Array.isArray(value)) return dedupe(value.flatMap(item=>collectText(item,depth+1,seen)));if(typeof value!=="object") return [];if(seen.has(value)) return [];seen.add(value);return dedupe([value.text,value.content,value.output_text,value.refusal,value.message,value.response,value.value].flatMap(item=>collectText(item,depth+1,seen)));};const extractText=value=>collectText(value).join("\n").trim();const summarizeShape=(value,depth=0)=>{if(depth>4||value===null||value===undefined) return undefined;if(typeof value==="string") return "string";if(Array.isArray(value)) return value.slice(0,5).map(item=>summarizeShape(item,depth+1));if(typeof value!=="object") return typeof value;return {type:typeof value.type==="string"?value.type:"object",keys:Object.keys(value).slice(0,10)};};process.stdin.on("data",c=>d+=c).on("end",()=>{const out={output_text:"",tool_calls:[],finish_reason:"stop"};try{const res=JSON.parse(d);const choice=Array.isArray(res.choices)&&res.choices[0]&&typeof res.choices[0]==="object"?res.choices[0]:{};const msg=choice.message&&typeof choice.message==="object"?choice.message:{};const content=extractText(msg.content)||extractText(msg.text)||extractText(msg.output_text)||extractText(msg.refusal)||extractText(choice.text)||extractText(choice.output_text)||extractText(res.output_text);const toolCalls=Array.isArray(msg.tool_calls)?msg.tool_calls.map((call,i)=>{if(!call||typeof call!=="object") return null;const fn=call.function&&typeof call.function==="object"?call.function:{};const name=typeof fn.name==="string"?fn.name.trim():"";if(!name) return null;const args=typeof fn.arguments==="string"?fn.arguments:JSON.stringify(fn.arguments??{});return {id:typeof call.id==="string"&&call.id?call.id:`call_${i+1}`,name,arguments:args};}).filter(Boolean):[];const finish=typeof choice.finish_reason==="string"&&choice.finish_reason?choice.finish_reason:(toolCalls.length>0?"tool_calls":"stop");out.output_text=content;out.tool_calls=toolCalls;out.finish_reason=finish;const normalizedContent=normalize(content);const isSyntheticFailure=toolCalls.length===0&&invalidFragments.some(fragment=>normalizedContent.includes(fragment));if((!content&&toolCalls.length===0)||isSyntheticFailure){process.stderr.write(`Groq returned invalid completion for model {{provider_model}} finish_reason=${finish} id=${typeof res.id==="string"?res.id:""} synthetic_failure=${isSyntheticFailure?"true":"false"} content_shape=${JSON.stringify(summarizeShape(msg.content))} content=${JSON.stringify(String(content||"").slice(0,160))}\n`);process.exit(86);}}catch(e){out.output_text=d.trim();}process.stdout.write(JSON.stringify(out));});'
          input: request_json_stdin
          output: json_contract
          timeoutMs: 120000
        auth:
          statusCommand:
            executable: sh
            args:
              - -lc
              - |
                test -n "${GROQ_API_KEY:-}" || { echo '{"ok":false,"error":"GROQ_API_KEY not set"}'; exit 1; }
                curl -fsS https://api.groq.com/openai/v1/models \
                  -H "Authorization: Bearer $GROQ_API_KEY" >/dev/null
                echo '{"ok":true}'
            timeoutMs: 15000

      - id: deepseek-api
        type: openai
        description: DeepSeek API
        baseUrl: https://api.deepseek.com
        apiKeyEnv: DEEPSEEK_API_KEY
        timeoutMs: 120000
        models:
          - id: deepseek-chat
            providerModel: deepseek-chat
            fallbackModels:
              - deepseek-reasoner
          - id: deepseek-coder
            providerModel: deepseek-chat
            description: Backward-compatible DeepSeek coding alias mapped to deepseek-chat
            fallbackModels:
              - deepseek-reasoner
          - id: deepseek-reasoner
            providerModel: deepseek-reasoner
            fallbackModels:
              - deepseek-chat
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-openai-cli-gateway-home
  namespace: n8n-openai-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models-gemma4
  namespace: n8n-openai-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: n8n-openai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      serviceAccountName: n8n-openai-cli-gateway
      imagePullSecrets:
        - name: ghcr-secret
      terminationGracePeriodSeconds: 120
      containers:
        - name: ollama
          image: ghcr.io/philly1084/ollama-upstream:main
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              trap 'kill -TERM "$OLLAMA_PID"; wait "$OLLAMA_PID"' TERM INT

              ollama serve &
              OLLAMA_PID=$!

              until ollama list >/dev/null 2>&1; do
                sleep 2
              done

              ollama pull gemma4:e4b
              ollama pull gemma4:e2b
              ollama pull gemma3:1b

              touch /tmp/models-ready
              wait "$OLLAMA_PID"
          ports:
            - name: http
              containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0:11434
            - name: OLLAMA_NO_CLOUD
              value: "1"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
            - name: OLLAMA_MAX_QUEUE
              value: "64"
            - name: OLLAMA_CONTEXT_LENGTH
              value: "8192"
            - name: OLLAMA_KEEP_ALIVE
              value: "30m"
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - test -f /tmp/models-ready
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "4"
              memory: 20Gi
            limits:
              cpu: "8"
              memory: 24Gi
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models-gemma4
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-openai-cli-gateway
  namespace: n8n-openai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-openai-cli-gateway
  template:
    metadata:
      labels:
        app: n8n-openai-cli-gateway
    spec:
      serviceAccountName: n8n-openai-cli-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: gemini-bootstrap
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: Always
          command:
            - sh
            - -lc
            - |
              set -eu
              export HOME=/var/lib/gateway-home
              export PATH="$HOME/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              mkdir -p "$HOME/.local/bin"
              if [ ! -x "$HOME/.local/bin/gemini" ]; then
                npm install -g --prefix "$HOME/.local" @google/gemini-cli
              fi
              "$HOME/.local/bin/gemini" --version >/dev/null
          env:
            - name: HOME
              value: /var/lib/gateway-home
            - name: PATH
              value: /var/lib/gateway-home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: provider-home
              mountPath: /var/lib/gateway-home
        - name: kimi-bootstrap
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: Always
          command:
            - sh
            - -lc
            - |
              set -eu
              export HOME=/var/lib/gateway-home
              export PATH="$HOME/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              mkdir -p "$HOME/.local/bin"
              if [ ! -x "$HOME/.local/bin/uv" ]; then
                curl -LsSf https://astral.sh/uv/install.sh | sh
              fi
              if [ -x "$HOME/.local/bin/kimi" ]; then
                "$HOME/.local/bin/uv" tool upgrade kimi-cli --no-cache
              else
                "$HOME/.local/bin/uv" tool install --python 3.13 kimi-cli
              fi
              "$HOME/.local/bin/kimi" --version >/dev/null
          env:
            - name: HOME
              value: /var/lib/gateway-home
            - name: PATH
              value: /var/lib/gateway-home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: provider-home
              mountPath: /var/lib/gateway-home
        - name: gemini-auth-bootstrap
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: Always
          command:
            - sh
            - -lc
            - |
              set -eu
              export HOME=/var/lib/gateway-home
              BOOTSTRAP_DIR=/bootstrap/gemini
              TARGET_DIR="$HOME/.gemini"
              if [ -f "$TARGET_DIR/oauth_creds.json" ]; then
                echo "Gemini auth already present in $TARGET_DIR"
                exit 0
              fi
              set -- "$BOOTSTRAP_DIR"/*
              if [ "$1" = "$BOOTSTRAP_DIR/*" ]; then
                echo "No Gemini auth bootstrap secret mounted; skipping seed"
                exit 0
              fi
              mkdir -p "$TARGET_DIR"
              cp "$BOOTSTRAP_DIR"/* "$TARGET_DIR"/
              chmod 700 "$TARGET_DIR"
              chmod 600 "$TARGET_DIR"/* || true
              echo "Seeded Gemini auth into $TARGET_DIR"
          env:
            - name: HOME
              value: /var/lib/gateway-home
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: provider-home
              mountPath: /var/lib/gateway-home
            - name: gemini-auth-seed
              mountPath: /bootstrap/gemini
              readOnly: true
      containers:
        - name: gateway
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: "info"
            - name: MAX_JOB_LOG_LINES
              value: "500"
            - name: PROVIDERS_CONFIG_PATH
              value: /app/config/providers.yaml
            - name: HOME
              value: /var/lib/gateway-home
            - name: PATH
              value: /var/lib/gateway-home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: N8N_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: n8nApiKey
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: adminApiKey
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: groqApiKey
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: deepseekApiKey
          volumeMounts:
            - name: providers-config
              mountPath: /app/config/providers.yaml
              subPath: providers.yaml
            - name: provider-home
              mountPath: /var/lib/gateway-home
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: providers-config
          configMap:
            name: n8n-openai-cli-gateway-config
        - name: provider-home
          persistentVolumeClaim:
            claimName: n8n-openai-cli-gateway-home
        - name: gemini-auth-seed
          secret:
            secretName: n8n-openai-cli-gateway-gemini-auth
            optional: true
