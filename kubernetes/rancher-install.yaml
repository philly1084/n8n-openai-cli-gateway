apiVersion: v1
kind: Namespace
metadata:
  name: n8n-openai-gateway
  labels:
    app.kubernetes.io/name: n8n-openai-cli-gateway
---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-openai-cli-gateway-secrets
  namespace: n8n-openai-gateway
type: Opaque
stringData:
  n8nApiKey: "replace-with-long-random-n8n-key"
  adminApiKey: "replace-with-long-random-admin-key"
  groqApiKey: "replace-with-groq-api-key"
  kimiApiKey: "replace-with-kimi-api-key"
  deepseekApiKey: "replace-with-deepseek-api-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: n8n-openai-gateway
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "replace-with-github-username",
          "password": "replace-with-github-token-read-packages"
        }
      }
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n-openai-cli-gateway
  namespace: n8n-openai-gateway
imagePullSecrets:
  - name: ghcr-secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-openai-cli-gateway-config
  namespace: n8n-openai-gateway
data:
  providers.yaml: |
    providers:
      - id: gemini-cli
        type: cli
        description: Gemini via OpenCode + Google OAuth plugin
        models:
          - id: gemini-3.1-pro-preview
            providerModel: google/gemini-3.1-pro-preview
            fallbackModels:
              - gemini-3-flash-preview
              - gpt-5.4
          - id: gemini-3-flash-preview
            providerModel: google/gemini-3-flash-preview
            fallbackModels:
              - gemini-3.1-pro-preview
              - gpt-5.4
          - id: gemini-3.1-flash-lite-preview
            providerModel: google/gemini-3.1-flash-lite-preview
            fallbackModels:
              - gemini-3-flash-preview
          - id: gemini-2.5-pro
            providerModel: google/gemini-2.5-pro
            fallbackModels:
              - gemini-3.1-pro-preview
          - id: gemini-2.5-flash
            providerModel: google/gemini-2.5-flash
            fallbackModels:
              - gemini-3-flash-preview
        responseCommand:
          executable: opencode
          args:
            - run
            - --model
            - "{{provider_model}}"
            - --format
            - default
            - "{{prompt}}"
          input: prompt_stdin
          output: text
          timeoutMs: 240000
        auth:
          loginCommand:
            executable: opencode
            args:
              - auth
              - login
            timeoutMs: 900000

      - id: codex-cli
        type: cli
        description: OpenAI Codex app-server bridge adapter
        models:
          - id: codex-latest
            providerModel: codex-latest
            fallbackModels:
              - gpt-5.4
              - gemini-3.1-pro-preview
          - id: gpt-5.4
            providerModel: gpt-5.4
            fallbackModels:
              - gpt-5.4-pro
              - gemini-3.1-pro-preview
          - id: gpt-5.4-pro
            providerModel: gpt-5.4-pro
            fallbackModels:
              - gpt-5.4
              - gemini-3.1-pro-preview
          - id: gpt-5.3-instant
            providerModel: gpt-5.3-instant
            fallbackModels:
              - gpt-5.4
          - id: gpt-4.1
            providerModel: gpt-4.1
            fallbackModels:
              - gpt-5.3-instant
          - id: gpt-5.1-codex-mini
            providerModel: gpt-5.1-codex-mini
            fallbackModels:
              - gpt-5.4
        responseCommand:
          executable: node
          args:
            - dist/scripts/codex-appserver-bridge.js
            - --model
            - "{{provider_model}}"
          input: request_json_stdin
          output: json_contract
          timeoutMs: 240000
        auth:
          loginCommand:
            executable: codex
            args:
              - login
              - --no-browser
            timeoutMs: 900000
          statusCommand:
            executable: codex
            args:
              - whoami
              - --json
            timeoutMs: 30000

      - id: kimi-code-cli
        type: cli
        description: Kimi API adapter via Moonshot Open Platform
        models:
          - id: kimi-for-coding
            providerModel: kimi-k2-turbo-preview
          - id: kimi-k2-turbo-preview
            providerModel: kimi-k2-turbo-preview
        responseCommand:
          executable: sh
          args:
            - -lc
            - |
              REQUEST_JSON="$(cat)"
              KIMI_API_KEY_VALUE="${KIMI_API_KEY:-${MOONSHOT_API_KEY:-}}"
              KIMI_BASE_URL_VALUE="${KIMI_BASE_URL:-${MOONSHOT_BASE_URL:-https://api.moonshot.ai/v1}}"
              if [ -z "$KIMI_API_KEY_VALUE" ]; then
                echo "Set KIMI_API_KEY or MOONSHOT_API_KEY." >&2
                exit 1
              fi
              PAYLOAD="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{const req=JSON.parse(d);const metadata=req&&typeof req.metadata==="object"&&req.metadata?req.metadata:{};const toolChoice=metadata&&typeof metadata.tool_choice==="object"&&metadata.tool_choice?metadata.tool_choice:undefined;const body={model:"{{provider_model}}",messages:Array.isArray(req.messages)?req.messages:[],stream:false};if(Array.isArray(req.tools)&&req.tools.length>0) body.tools=req.tools;if(toolChoice) body.tool_choice=toolChoice;if(typeof req.temperature==="number") body.temperature=req.temperature;if(typeof req.max_tokens==="number") body.max_tokens=req.max_tokens;if(typeof req.top_p==="number") body.top_p=req.top_p;if(typeof req.presence_penalty==="number") body.presence_penalty=req.presence_penalty;if(typeof req.frequency_penalty==="number") body.frequency_penalty=req.frequency_penalty;process.stdout.write(JSON.stringify(body));});'
              )"
              RESPONSE_JSON="$(curl -fsS "$KIMI_BASE_URL_VALUE/chat/completions" -H "Content-Type: application/json" -H "Authorization: Bearer $KIMI_API_KEY_VALUE" -d "$PAYLOAD")" || exit $?
              printf "%s" "$RESPONSE_JSON" | node -e '
                let d="";
                const normalizeText=(value)=>{
                  if(typeof value==="string") return value;
                  if(Array.isArray(value)){
                    return value.map((part)=>{
                      if(typeof part==="string") return part;
                      if(!part||typeof part!=="object") return "";
                      if(typeof part.text==="string") return part.text;
                      if(typeof part.content==="string") return part.content;
                      return "";
                    }).filter(Boolean).join("\n");
                  }
                  return "";
                };
                const normalizeToolCalls=(value)=>{
                  const calls=Array.isArray(value)?value:[];
                  return calls.map((call,index)=>{
                    if(!call||typeof call!=="object") return null;
                    const fn=call.function&&typeof call.function==="object"?call.function:{};
                    const name=typeof fn.name==="string"&&fn.name?fn.name:(typeof call.name==="string"?call.name:"");
                    if(!name) return null;
                    const args=fn.arguments!==undefined?fn.arguments:(call.arguments!==undefined?call.arguments:{});
                    return {
                      id:typeof call.id==="string"&&call.id?call.id:`call_${index+1}`,
                      name,
                      arguments:typeof args==="string"?args:JSON.stringify(args)
                    };
                  }).filter(Boolean);
                };
                process.stdin.on("data",c=>d+=c).on("end",()=>{
                  const response=JSON.parse(d);
                  const choice=Array.isArray(response.choices)&&response.choices.length>0&&response.choices[0]&&typeof response.choices[0]==="object"?response.choices[0]:{};
                  const message=choice&&typeof choice.message==="object"&&choice.message?choice.message:{};
                  const toolCalls=normalizeToolCalls(message.tool_calls);
                  const finishReason=typeof choice.finish_reason==="string"&&choice.finish_reason?choice.finish_reason:(toolCalls.length>0?"tool_calls":"stop");
                  const out={
                    output_text:normalizeText(message.content),
                    finish_reason:finishReason
                  };
                  if(toolCalls.length>0){
                    out.tool_calls=toolCalls;
                  }
                  process.stdout.write(JSON.stringify(out));
                });
              '
          input: request_json_stdin
          output: json_contract
          timeoutMs: 240000
        auth:
          loginCommand:
            executable: sh
            args:
              - -c
              - |
                echo "Kimi uses API key auth in this setup."
                echo "Set KIMI_API_KEY or MOONSHOT_API_KEY."
                exit 1
            timeoutMs: 10000
          statusCommand:
            executable: sh
            args:
              - -c
              - |
                KIMI_API_KEY_VALUE="${KIMI_API_KEY:-${MOONSHOT_API_KEY:-}}"
                KIMI_BASE_URL_VALUE="${KIMI_BASE_URL:-${MOONSHOT_BASE_URL:-https://api.moonshot.ai/v1}}"
                if [ -z "$KIMI_API_KEY_VALUE" ]; then
                  echo '{"ok":false,"error":"missing KIMI_API_KEY or MOONSHOT_API_KEY"}'
                  exit 1
                fi
                curl -fsS "$KIMI_BASE_URL_VALUE/models" -H "Authorization: Bearer $KIMI_API_KEY_VALUE"
            timeoutMs: 30000

      - id: groq-api
        type: cli
        description: Groq API via curl using Groq production chat models
        models:
          - id: groq/compound
            providerModel: groq/compound
            fallbackModels:
              - openai/gpt-oss-20b
              - llama-3.3-70b-versatile
          - id: groq/compound-mini
            providerModel: groq/compound-mini
            fallbackModels:
              - openai/gpt-oss-20b
          - id: openai/gpt-oss-120b
            providerModel: openai/gpt-oss-120b
            fallbackModels:
              - openai/gpt-oss-20b
          - id: openai/gpt-oss-20b
            providerModel: openai/gpt-oss-20b
            fallbackModels:
              - llama-3.1-8b-instant
          - id: llama-3.3-70b-versatile
            providerModel: llama-3.3-70b-versatile
          - id: llama-3.1-8b-instant
            providerModel: llama-3.1-8b-instant
        responseCommand:
          executable: sh
          args:
            - -lc
            - |
              REQUEST_JSON="$(cat)"
              PAYLOAD="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";const maxChars=Number(process.env.GROQ_MAX_PROMPT_CHARS||120000);process.stdin.on("data",c=>d+=c).on("end",()=>{const norm=v=>typeof v==="string"?v:JSON.stringify(v??"");try{const req=JSON.parse(d);const rawMsgs=Array.isArray(req.messages)?req.messages:[];const allowedRoles=new Set(["system","user","assistant","tool"]);const msgs=rawMsgs.map(m=>{const role=allowedRoles.has(String(m&&m.role||""))?String(m.role):"user";const content=norm(m&&Object.prototype.hasOwnProperty.call(m,"content")?m.content:"").trim();if(!content)return null;const out={role,content};if(role==="tool"&&m&&typeof m==="object"&&typeof m.tool_call_id==="string"&&m.tool_call_id){out.tool_call_id=m.tool_call_id;}if(role==="assistant"&&m&&typeof m==="object"&&Array.isArray(m.tool_calls)&&m.tool_calls.length>0){out.tool_calls=m.tool_calls;}return out;}).filter(Boolean);let total=0;const kept=[];for(let i=msgs.length-1;i>=0;i--){const msg=msgs[i];const cost=msg.content.length+msg.role.length+32;if(kept.length>0&&total+cost>maxChars) continue;kept.unshift(msg);total+=cost;}const firstSystem=msgs.find(m=>m.role==="system");if(firstSystem&&!kept.some(m=>m.role==="system")&&(total+firstSystem.content.length+32)<=maxChars){kept.unshift(firstSystem);total+=firstSystem.content.length+32;}if(kept.length===0){const fallback=(typeof req.prompt==="string"?req.prompt:norm(req.prompt)).trim();kept.push({role:"user",content:fallback.slice(-maxChars)||"Hello"});}process.stdout.write(JSON.stringify({model:"{{provider_model}}",messages:kept,stream:false}));}catch{process.stdout.write(JSON.stringify({model:"{{provider_model}}",messages:[{role:"user",content:"Hello"}],stream:false}));}});'
              )"
              printf "%s" "$PAYLOAD" | curl -fsS https://api.groq.com/openai/v1/chat/completions \
                -H "Authorization: Bearer $GROQ_API_KEY" \
                -H "Content-Type: application/json" \
                --data-binary @- | \
                node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{const out={output_text:"",tool_calls:[],finish_reason:"stop"};try{const res=JSON.parse(d);const choice=Array.isArray(res.choices)&&res.choices[0]&&typeof res.choices[0]==="object"?res.choices[0]:{};const msg=choice.message&&typeof choice.message==="object"?choice.message:{};const extractText=(content)=>{if(typeof content==="string") return content.trim();if(Array.isArray(content)){return content.map(part=>{if(typeof part==="string") return part;if(part&&typeof part==="object"){if(typeof part.text==="string") return part.text;if(typeof part.content==="string") return part.content;if(typeof part.output_text==="string") return part.output_text;if(typeof part.refusal==="string") return part.refusal;}return "";}).filter(Boolean).join("\n").trim();}if(content&&typeof content==="object"){if(typeof content.text==="string") return content.text.trim();if(typeof content.content==="string") return content.content.trim();if(typeof content.output_text==="string") return content.output_text.trim();if(typeof content.refusal==="string") return content.refusal.trim();}return "";};const content=extractText(msg.content)||extractText(msg.text)||extractText(msg.output_text)||extractText(msg.refusal)||extractText(choice.text)||extractText(choice.output_text)||extractText(res.output_text);const toolCalls=Array.isArray(msg.tool_calls)?msg.tool_calls.map((call,i)=>{if(!call||typeof call!=="object") return null;const fn=call.function&&typeof call.function==="object"?call.function:{};const name=typeof fn.name==="string"?fn.name.trim():"";if(!name) return null;const args=typeof fn.arguments==="string"?fn.arguments:JSON.stringify(fn.arguments??{});return {id:typeof call.id==="string"&&call.id?call.id:`call_${i+1}`,name,arguments:args};}).filter(Boolean):[];const finish=typeof choice.finish_reason==="string"&&choice.finish_reason?choice.finish_reason:(toolCalls.length>0?"tool_calls":"stop");out.output_text=content;out.tool_calls=toolCalls;out.finish_reason=finish;if(!content&&toolCalls.length===0){process.stderr.write(`Groq returned blank completion for model {{provider_model}} finish_reason=${finish} id=${typeof res.id==="string"?res.id:""}\n`);process.exit(86);}}catch(e){out.output_text=d.trim();}process.stdout.write(JSON.stringify(out));});'
          input: request_json_stdin
          output: json_contract
          timeoutMs: 120000
        auth:
          statusCommand:
            executable: sh
            args:
              - -lc
              - |
                test -n "${GROQ_API_KEY:-}" || { echo '{"ok":false,"error":"GROQ_API_KEY not set"}'; exit 1; }
                curl -fsS https://api.groq.com/openai/v1/models \
                  -H "Authorization: Bearer $GROQ_API_KEY" >/dev/null
                echo '{"ok":true}'
            timeoutMs: 15000

      - id: deepseek-api
        type: cli
        description: DeepSeek API
        models:
          - id: deepseek-chat
            providerModel: deepseek-chat
            fallbackModels:
              - deepseek-coder
          - id: deepseek-coder
            providerModel: deepseek-coder
            fallbackModels:
              - deepseek-chat
          - id: deepseek-reasoner
            providerModel: deepseek-reasoner
        responseCommand:
          executable: curl
          args:
            - -s
            - https://api.deepseek.com/chat/completions
            - -H
            - "Authorization: Bearer $DEEPSEEK_API_KEY"
            - -H
            - "Content-Type: application/json"
            - -d
            - |
              {
                "model": "{{provider_model}}",
                "messages": [{"role": "user", "content": "{{prompt}}"}],
                "temperature": 0.7
              }
          input: prompt_stdin
          output: text_contract_final_line
          timeoutMs: 120000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-openai-cli-gateway-opencode-config
  namespace: n8n-openai-gateway
data:
  opencode.json: |
    {
      "$schema": "https://opencode.ai/config.json",
      "plugin": ["opencode-gemini-auth@latest"]
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-openai-cli-gateway-home
  namespace: n8n-openai-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-openai-cli-gateway
  namespace: n8n-openai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-openai-cli-gateway
  template:
    metadata:
      labels:
        app: n8n-openai-cli-gateway
    spec:
      serviceAccountName: n8n-openai-cli-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: "info"
            - name: MAX_JOB_LOG_LINES
              value: "500"
            - name: PROVIDERS_CONFIG_PATH
              value: /app/config/providers.yaml
            - name: HOME
              value: /var/lib/gateway-home
            - name: PATH
              value: /var/lib/gateway-home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: N8N_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: n8nApiKey
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: adminApiKey
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: groqApiKey
            - name: KIMI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: kimiApiKey
            - name: MOONSHOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: kimiApiKey
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: deepseekApiKey
          volumeMounts:
            - name: providers-config
              mountPath: /app/config/providers.yaml
              subPath: providers.yaml
            - name: provider-home
              mountPath: /var/lib/gateway-home
            - name: opencode-config
              mountPath: /var/lib/gateway-home/.config/opencode
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: providers-config
          configMap:
            name: n8n-openai-cli-gateway-config
        - name: provider-home
          persistentVolumeClaim:
            claimName: n8n-openai-cli-gateway-home
        - name: opencode-config
          configMap:
            name: n8n-openai-cli-gateway-opencode-config
---
apiVersion: v1
kind: Service
metadata:
  name: n8n-openai-cli-gateway
  namespace: n8n-openai-gateway
  labels:
    app: n8n-openai-cli-gateway
spec:
  type: ClusterIP
  selector:
    app: n8n-openai-cli-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
