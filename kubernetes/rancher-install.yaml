                printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const tools=Array.isArray(req.tools)?req.tools:[];const names=[];for(const item of tools){if(!item||typeof item!=="object") continue;const fn=item.function&&typeof item.function==="object"?item.function:null;const name=fn&&typeof fn.name==="string"?fn.name.trim():"";if(name) names.push(name);}process.stdout.write(JSON.stringify(names));}catch{process.stdout.write("[]");}});'
              )"
              LAST_USER_TEXT="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const msgs=Array.isArray(req.messages)?req.messages:[];for(let i=msgs.length-1;i>=0;i--){const m=msgs[i];if(!m||typeof m!=="object") continue;if(String(m.role||"")==="user"){const c=typeof m.content==="string"?m.content:(m&&Object.prototype.hasOwnProperty.call(m,"content")?JSON.stringify(m.content??""):"");process.stdout.write(c||"");return;}}process.stdout.write("");}catch{process.stdout.write("");}});'
              )"
              SYNTHETIC_TOOL_CALL_JSON="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const tools=Array.isArray(req.tools)?req.tools:[];if(tools.length!==1){process.stdout.write("null");return;}const item=tools[0];if(!item||typeof item!=="object"){process.stdout.write("null");return;}const fn=item.function&&typeof item.function==="object"?item.function:null;const name=fn&&typeof fn.name==="string"?fn.name.trim():"";if(!name){process.stdout.write("null");return;}const description=typeof fn.description==="string"?fn.description:"";const params=fn&&fn.parameters&&typeof fn.parameters==="object"?fn.parameters:{};const props=params&&params.properties&&typeof params.properties==="object"?params.properties:{};const required=Array.isArray(params.required)?params.required.filter(x=>typeof x==="string"):[];const msgs=Array.isArray(req.messages)?req.messages:[];let userText="";for(let i=msgs.length-1;i>=0;i--){const m=msgs[i];if(!m||typeof m!=="object") continue;if(String(m.role||"")==="user"){userText=typeof m.content==="string"?m.content:JSON.stringify(m.content??"");break;}}const words=String(userText||"").toLowerCase().replace(/[^a-z0-9\s]/g," ").split(/\s+/).filter(Boolean).slice(0,8).join(" ");const session=(description.match(/sessionid\s*(?:is|=|:)\s*"([^"]+)"/i)||[])[1]||"LocalAgentMemory";const out={};const setArg=(key)=>{const lower=String(key||"").toLowerCase();if(/user|userid|session|account|tenant/.test(lower)){out[key]=session;return;}if(/content|query|search|keyword|text|prompt|message|input/.test(lower)){out[key]=words||userText||"memory";return;}out[key]="";};for(const key of required){setArg(key);}if(required.length===0){if(Object.prototype.hasOwnProperty.call(props,"userID")) out.userID=session;if(Object.prototype.hasOwnProperty.call(props,"content")) out.content=words||userText||"memory";}process.stdout.write(JSON.stringify({id:"call_1",name,arguments:out}));}catch{process.stdout.write("null");}});'
              )"
              PROMPT="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{const req=JSON.parse(d);const msgs=Array.isArray(req.messages)?req.messages:[];const tools=Array.isArray(req.tools)?req.tools:[];const metadata=req&&typeof req.metadata==="object"&&req.metadata?req.metadata:{};const toolChoice=metadata&&typeof metadata.tool_choice==="object"&&metadata.tool_choice?metadata.tool_choice:{};const forcedToolName=toolChoice&&toolChoice.type==="function"&&toolChoice.function&&typeof toolChoice.function==="object"&&typeof toolChoice.function.name==="string"?String(toolChoice.function.name).trim():"";const norm=v=>typeof v==="string"?v:JSON.stringify(v??"");const msgText=typeof req.prompt==="string"&&req.prompt.trim()?req.prompt:msgs.map(m=>{const role=String(m&&m.role?m.role:"user").toUpperCase();const name=m&&typeof m==="object"&&typeof m.name==="string"&&m.name?` (${m.name})`:"";const tcid=m&&typeof m==="object"&&typeof m.tool_call_id==="string"&&m.tool_call_id?` [tool_call_id=${m.tool_call_id}]`:"";return `${role}${name}${tcid}:\n${norm(m&&Object.prototype.hasOwnProperty.call(m,"content")?m.content:"")}`;}).join("\n\n");const toolCatalog=tools.map(item=>{if(!item||typeof item!=="object") return null;const fn=item.function&&typeof item.function==="object"?item.function:null;const name=fn&&typeof fn.name==="string"?fn.name.trim():"";if(!name) return null;const description=typeof fn.description==="string"&&fn.description.trim()?fn.description.trim():"Tool exposed by AVAILABLE_TOOLS_JSON.";const parameters=Object.prototype.hasOwnProperty.call(fn,"parameters")?fn.parameters:{type:"object",additionalProperties:true};return {name,description,parameters};}).filter(Boolean);const toolJson=JSON.stringify(tools,null,2);const toolCatalogJson=JSON.stringify(toolCatalog,null,2);const toolNames=toolCatalog.map(t=>t.name).join(", ");const instruction=["You are connected through an OpenAI-compatible gateway.","The tools listed in AVAILABLE_TOOLS_JSON are the only tools you can use in this turn.","Do not claim that tools are unavailable when AVAILABLE_TOOLS_JSON is non-empty.","Do not use any hidden or internal tools, shell commands, filesystem access, web browsing, or MCP tools.",forcedToolName?`tool_choice is set. You MUST call exactly this function name: ${forcedToolName}.`:"Use tools only when needed for external actions or data. For normal chat tasks including creative writing, respond directly with finish_reason stop.","When calling a tool, the name MUST exactly match one value from AVAILABLE_TOOL_NAMES.","Return raw JSON only. Do not wrap JSON in markdown or code fences.","If you need to call a tool, respond ONLY with JSON:","{\"output_text\":\"\",\"tool_calls\":[{\"id\":\"call_1\",\"name\":\"tool_name\",\"arguments\":{\"arg\":\"value\"}}],\"finish_reason\":\"tool_calls\"}","If no tool is needed, respond ONLY with JSON:","{\"output_text\":\"<assistant reply>\",\"finish_reason\":\"stop\"}"].join("\n");process.stdout.write([msgText,"","AVAILABLE_TOOLS_JSON:",toolJson,"","TOOL_CATALOG_JSON:",toolCatalogJson,"","AVAILABLE_TOOL_NAMES:",toolNames||"(none)","",instruction].join("\n"));});'
              )"
              export HOME="${HOME:-/var/lib/gateway-home}"
              export PATH="$HOME/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              KIMI_CONFIG_FILE=""
              for KIMI_CONFIG_CANDIDATE in \
                "$HOME/.kimi/config.toml" \
                "$HOME/config.toml" \
                "$HOME/.kimi/config.json" \
                "$HOME/config.json" \
                "$HOME/.kimi/kimi.json" \
                "$HOME/kimi.json"
              do
                if [ -f "$KIMI_CONFIG_CANDIDATE" ]; then
                  KIMI_CONFIG_FILE="$KIMI_CONFIG_CANDIDATE"
                  break
                fi
              done
              if [ -z "$KIMI_CONFIG_FILE" ]; then
                KIMI_CONFIG_FILE="$HOME/.kimi/config.toml"
              fi
              KIMI_MODEL_VALUE="{{provider_model}}"
              KIMI_CONFIG_TO_USE="$KIMI_CONFIG_FILE"
              if [ ! -f "$KIMI_CONFIG_FILE" ]; then
                KIMI_CONFIG_TO_USE="$(mktemp)"
                {
                  printf "default_model = \"%s\"\n" "$KIMI_MODEL_VALUE"
                  printf "default_llm = \"%s\"\n" "$KIMI_MODEL_VALUE"
                  printf "model = \"%s\"\n" "$KIMI_MODEL_VALUE"
                  printf "llm = \"%s\"\n" "$KIMI_MODEL_VALUE"
                } > "$KIMI_CONFIG_TO_USE"
              elif [ "${KIMI_CONFIG_FILE##*.}" = "toml" ]; then
                if ! grep -Eq "^[[:space:]]*(default_model|default_llm|model|llm)[[:space:]]*=" "$KIMI_CONFIG_FILE"; then
                  KIMI_CONFIG_TO_USE="$(mktemp)"
                  {
                    printf "default_model = \"%s\"\n" "$KIMI_MODEL_VALUE"
                    printf "default_llm = \"%s\"\n" "$KIMI_MODEL_VALUE"
                    printf "model = \"%s\"\n" "$KIMI_MODEL_VALUE"
                    printf "llm = \"%s\"\n" "$KIMI_MODEL_VALUE"
                    cat "$KIMI_CONFIG_FILE"
                  } > "$KIMI_CONFIG_TO_USE"
                fi
              elif [ "${KIMI_CONFIG_FILE##*.}" = "json" ]; then
                KIMI_CONFIG_TO_USE="$(mktemp)"
                if ! node -e 'const fs=require("fs"); const file=process.argv[1]; const model=String(process.argv[2]||""); let cfg={}; try{cfg=JSON.parse(fs.readFileSync(file,"utf8"));}catch{} if(!cfg||typeof cfg!=="object"||Array.isArray(cfg)) cfg={}; if(!("default_model" in cfg)) cfg.default_model=model; if(!("default_llm" in cfg)) cfg.default_llm=model; if(!("model" in cfg)) cfg.model=model; if(!("llm" in cfg)) cfg.llm=model; process.stdout.write(JSON.stringify(cfg,null,2));' "$KIMI_CONFIG_FILE" "$KIMI_MODEL_VALUE" > "$KIMI_CONFIG_TO_USE"; then
                  cp "$KIMI_CONFIG_FILE" "$KIMI_CONFIG_TO_USE"
                fi
              fi
              KIMI_STDERR_FILE="$(mktemp)"
              KIMI_EXIT_CODE=1
              KIMI_MODEL_CANDIDATES="$KIMI_MODEL_VALUE"
              if [ "$KIMI_MODEL_VALUE" = "kimi-for-coding" ]; then
                KIMI_MODEL_CANDIDATES="$KIMI_MODEL_CANDIDATES kimi-k2-turbo-preview"
              fi
              for KIMI_MODEL_CANDIDATE in $KIMI_MODEL_CANDIDATES; do
                for KIMI_MODEL_ARG in --model -m; do
                  if [ -f "$KIMI_CONFIG_TO_USE" ]; then
                    KIMI_EXIT_CODE=0
                    RAW_OUTPUT="$(LLM="$KIMI_MODEL_CANDIDATE" MODEL="$KIMI_MODEL_CANDIDATE" DEFAULT_MODEL="$KIMI_MODEL_CANDIDATE" KIMI_MODEL="$KIMI_MODEL_CANDIDATE" KIMI_LLM="$KIMI_MODEL_CANDIDATE" KIMI_DEFAULT_MODEL="$KIMI_MODEL_CANDIDATE" kimi --config-file "$KIMI_CONFIG_TO_USE" --print "$KIMI_MODEL_ARG" "$KIMI_MODEL_CANDIDATE" --output-format=stream-json --prompt "$PROMPT" 2>"$KIMI_STDERR_FILE")" || KIMI_EXIT_CODE=$?
                  else
                    KIMI_EXIT_CODE=0
                    RAW_OUTPUT="$(LLM="$KIMI_MODEL_CANDIDATE" MODEL="$KIMI_MODEL_CANDIDATE" DEFAULT_MODEL="$KIMI_MODEL_CANDIDATE" KIMI_MODEL="$KIMI_MODEL_CANDIDATE" KIMI_LLM="$KIMI_MODEL_CANDIDATE" KIMI_DEFAULT_MODEL="$KIMI_MODEL_CANDIDATE" kimi --print "$KIMI_MODEL_ARG" "$KIMI_MODEL_CANDIDATE" --output-format=stream-json --prompt "$PROMPT" 2>"$KIMI_STDERR_FILE")" || KIMI_EXIT_CODE=$?
                  fi
                  if [ "$KIMI_EXIT_CODE" -eq 0 ]; then
                    if printf "%s" "$RAW_OUTPUT" | grep -Eqi "llm not set|model not set"; then
                      printf "%s\n" "$RAW_OUTPUT" > "$KIMI_STDERR_FILE"
                      KIMI_EXIT_CODE=86
                      continue
                    fi
                    break 2
                  fi
                  if grep -Eqi "llm not set|model not set|no such option|unknown option|unrecognized option|invalid option" "$KIMI_STDERR_FILE"; then
                    continue
                  fi
                  break
                done
                if [ "$KIMI_EXIT_CODE" -eq 0 ]; then
                  break
                fi
              done
              if [ "$KIMI_EXIT_CODE" -ne 0 ]; then
                KIMI_FALLBACK_MODEL="${KIMI_MODEL_CANDIDATE:-$KIMI_MODEL_VALUE}"
                if [ -f "$KIMI_CONFIG_TO_USE" ]; then
                  KIMI_EXIT_CODE=0
                  RAW_OUTPUT="$(LLM="$KIMI_FALLBACK_MODEL" MODEL="$KIMI_FALLBACK_MODEL" DEFAULT_MODEL="$KIMI_FALLBACK_MODEL" KIMI_MODEL="$KIMI_FALLBACK_MODEL" KIMI_LLM="$KIMI_FALLBACK_MODEL" KIMI_DEFAULT_MODEL="$KIMI_FALLBACK_MODEL" kimi --config-file "$KIMI_CONFIG_TO_USE" --print --output-format=stream-json --prompt "$PROMPT" 2>"$KIMI_STDERR_FILE")" || KIMI_EXIT_CODE=$?
                else
                  KIMI_EXIT_CODE=0
                  RAW_OUTPUT="$(LLM="$KIMI_FALLBACK_MODEL" MODEL="$KIMI_FALLBACK_MODEL" DEFAULT_MODEL="$KIMI_FALLBACK_MODEL" KIMI_MODEL="$KIMI_FALLBACK_MODEL" KIMI_LLM="$KIMI_FALLBACK_MODEL" KIMI_DEFAULT_MODEL="$KIMI_FALLBACK_MODEL" kimi --print --output-format=stream-json --prompt "$PROMPT" 2>"$KIMI_STDERR_FILE")" || KIMI_EXIT_CODE=$?
                fi
                if [ "$KIMI_EXIT_CODE" -eq 0 ] && printf "%s" "$RAW_OUTPUT" | grep -Eqi "llm not set|model not set"; then
                  printf "%s\n" "$RAW_OUTPUT" > "$KIMI_STDERR_FILE"
                  KIMI_EXIT_CODE=86
                fi
              fi
              if [ "$KIMI_EXIT_CODE" -ne 0 ]; then
                {
                  echo "KIMI debug: config_file=$KIMI_CONFIG_FILE config_to_use=$KIMI_CONFIG_TO_USE"
                  echo "KIMI debug: model_candidates=$KIMI_MODEL_CANDIDATES"
                  echo "KIMI debug: last_candidate=${KIMI_MODEL_CANDIDATE:-} last_arg=${KIMI_MODEL_ARG:-}"
                  cat "$KIMI_STDERR_FILE"
                } >&2
                exit "$KIMI_EXIT_CODE"
              fi
              rm -f "$KIMI_STDERR_FILE"
              if [ "$KIMI_CONFIG_TO_USE" != "$KIMI_CONFIG_FILE" ]; then
                rm -f "$KIMI_CONFIG_TO_USE"
              fi
              printf "%s" "$RAW_OUTPUT" | node -e '
                let d="";
                const hasTools=process.argv[1]==="1";
                let allowedNames=[];
                try{
                  const parsedAllowed=JSON.parse(process.argv[2]||"[]");
                  if(Array.isArray(parsedAllowed)){
                    allowedNames=parsedAllowed.filter(v=>typeof v==="string"&&v.trim()).map(v=>v.trim());
                  }
                }catch{}
                const lastUserText=String(process.argv[3]||"");
                let syntheticCall=null;
                try{
                  const parsedSynthetic=JSON.parse(process.argv[4]||"null");
                  if(parsedSynthetic&&typeof parsedSynthetic==="object"){
                    syntheticCall=parsedSynthetic;
                  }
                }catch{}
                const normalizeName=(name)=>String(name??"").trim().replace(/([a-z0-9])([A-Z])/g,"$1_$2").replace(/[\s\-./]+/g,"_").replace(/[^A-Za-z0-9_]/g,"_").replace(/_+/g,"_").replace(/^_+|_+$/g,"").toLowerCase();
                const allowedMap=new Map(allowedNames.map(n=>[normalizeName(n),n]));
                const normalizeAlias=(name)=>normalizeName(name).replace(/^(tool_|function_|fn_)+/,"").replace(/(_tool|_function|_fn|_api|_call)+$/,"");
                const resolveAllowedName=(name)=>{const raw=String(name??"").trim(); if(!raw) return ""; if(allowedMap.size===0) return raw; const direct=allowedMap.get(normalizeName(raw)); if(direct) return direct; const aliasNorm=normalizeAlias(raw); if(aliasNorm){const alias=allowedMap.get(aliasNorm); if(alias) return alias;} if(allowedNames.length===1){return allowedNames[0];} return "";};
                const getProp=(obj,keyCandidates)=>{if(!obj||typeof obj!=="object") return undefined; for(const key of keyCandidates){ if(Object.prototype.hasOwnProperty.call(obj,key)) return obj[key]; } const normalizedCandidates=keyCandidates.map(k=>normalizeName(k)); for(const [rawKey,val] of Object.entries(obj)){ if(normalizedCandidates.includes(normalizeName(rawKey))) return val; } return undefined;};
                const asArgs=(value)=>{ if(typeof value==="string") return value; try{ return JSON.stringify(value??{}); }catch{ return "{}"; } };
                const normalizeCall=(entry,index)=>{ if(!entry||typeof entry!=="object") return null; const fn=entry.function&&typeof entry.function==="object"?entry.function:null; const merged=entry.functionCall&&typeof entry.functionCall==="object"?entry.functionCall:(entry.function_call&&typeof entry.function_call==="object"?entry.function_call:fn); const rawName=(typeof getProp(entry,["name"])==="string"&&getProp(entry,["name"])||"")||(typeof getProp(entry,["tool_name","toolName"])==="string"&&getProp(entry,["tool_name","toolName"])||"")||(typeof getProp(merged,["name"])==="string"&&getProp(merged,["name"])||""); const name=String(rawName||"").trim(); if(!name) return null; const mappedName=resolveAllowedName(name); if(allowedMap.size>0&&!mappedName) return null; const argsRaw=getProp(entry,["arguments","args","parameters"]) ?? getProp(merged,["arguments","args","parameters"]) ?? {}; const idFromObj=getProp(entry,["id","call_id","tool_id","toolId"]); const id=(typeof idFromObj==="string"&&idFromObj?String(idFromObj).trim():"")||`call_${index+1}`; return { id, name:mappedName||name, arguments:asArgs(argsRaw) }; };
                const toolCalls=[]; const textChunks=[];
                process.stdin.on("data",c=>d+=c).on("end",()=>{ const t=d.trim(); if(!t){ process.stdout.write(JSON.stringify({output_text:"",finish_reason:"stop"})); return; } const lines=t.split(/\r?\n/).map(line=>line.trim()).filter(Boolean); for(const line of lines){ let parsed=null; try{ parsed=JSON.parse(line); }catch{ continue; } const call=normalizeCall(parsed,toolCalls.length); if(call) toolCalls.push(call); if(typeof parsed.output_text==="string"&&parsed.output_text.trim()) textChunks.push(parsed.output_text.trim()); if(typeof parsed.text==="string"&&parsed.text.trim()) textChunks.push(parsed.text.trim()); if(typeof parsed.response==="string"&&parsed.response.trim()) textChunks.push(parsed.response.trim()); if(parsed.message&&typeof parsed.message==="object"&&typeof parsed.message.content==="string"&&parsed.message.content.trim()) textChunks.push(parsed.message.content.trim()); } const outputText=[...new Set(textChunks)].join("\n").trim(); const uniqueCalls=[]; const seen=new Set(); for(const call of toolCalls){ const key=`${call.id}\u0000${call.name}\u0000${call.arguments}`; if(seen.has(key)) continue; seen.add(key); uniqueCalls.push(call); } const userAskedTool=/\b(use|call|invoke|run|search|find|look|query|check)\b/.test(lastUserText.toLowerCase()); if(hasTools&&uniqueCalls.length>0){ process.stdout.write(JSON.stringify({output_text:outputText,tool_calls:uniqueCalls,finish_reason:"tool_calls"})); return; } if(hasTools&&syntheticCall&&userAskedTool){ process.stdout.write(JSON.stringify({output_text:outputText,tool_calls:[syntheticCall],finish_reason:"tool_calls"})); return; } process.stdout.write(JSON.stringify({output_text:outputText||t,finish_reason:"stop"})); });
              ' "$HAS_TOOLS" "$ALLOWED_TOOL_NAMES_JSON" "$LAST_USER_TEXT" "$SYNTHETIC_TOOL_CALL_JSON"
          input: request_json_stdin
          output: json_contract
          timeoutMs: 240000
        auth:
          loginCommand:
            executable: sh
            args:
              - -c
              - |
                echo "Kimi Code CLI login is interactive in this version."
                echo "Run in a TTY shell: kimi"
                echo "Then run: /setup and complete auth."
                exit 1
            timeoutMs: 10000
          statusCommand:
            executable: sh
            args:
              - -c
              - |
                if [ -f "$HOME/.kimi/config.toml" ] || [ -f "$HOME/.kimi/config.json" ]; then
                  echo '{"ok":true,"source":"~/.kimi/config.toml"}'
                  exit 0
                fi
                echo '{"ok":false,"error":"missing ~/.kimi/config.toml (run kimi then /setup)"}'
                exit 1
            timeoutMs: 30000

      - id: groq-api
        type: cli
        description: Groq API via curl using Groq production chat models
        models:
          - id: groq/compound
            providerModel: groq/compound
            fallbackModels:
              - openai/gpt-oss-20b
              - llama-3.3-70b-versatile
          - id: groq/compound-mini
            providerModel: groq/compound-mini
            fallbackModels:
              - openai/gpt-oss-20b
          - id: openai/gpt-oss-120b
            providerModel: openai/gpt-oss-120b
            fallbackModels:
              - openai/gpt-oss-20b
          - id: openai/gpt-oss-20b
            providerModel: openai/gpt-oss-20b
            fallbackModels:
              - llama-3.1-8b-instant
          - id: llama-3.3-70b-versatile
            providerModel: llama-3.3-70b-versatile
          - id: llama-3.1-8b-instant
            providerModel: llama-3.1-8b-instant
        responseCommand:
          executable: sh
          args:
            - -lc
            - |
              REQUEST_JSON="$(cat)"
              PAYLOAD="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";const maxChars=Number(process.env.GROQ_MAX_PROMPT_CHARS||120000);process.stdin.on("data",c=>d+=c).on("end",()=>{const norm=v=>typeof v==="string"?v:JSON.stringify(v??"");try{const req=JSON.parse(d);const rawMsgs=Array.isArray(req.messages)?req.messages:[];const allowedRoles=new Set(["system","user","assistant","tool"]);const msgs=rawMsgs.map(m=>{const role=allowedRoles.has(String(m&&m.role||""))?String(m.role):"user";const content=norm(m&&Object.prototype.hasOwnProperty.call(m,"content")?m.content:"").trim();if(!content)return null;const out={role,content};if(role==="tool"&&m&&typeof m==="object"&&typeof m.tool_call_id==="string"&&m.tool_call_id){out.tool_call_id=m.tool_call_id;}if(role==="assistant"&&m&&typeof m==="object"&&Array.isArray(m.tool_calls)&&m.tool_calls.length>0){out.tool_calls=m.tool_calls;}return out;}).filter(Boolean);let total=0;const kept=[];for(let i=msgs.length-1;i>=0;i--){const msg=msgs[i];const cost=msg.content.length+msg.role.length+32;if(kept.length>0&&total+cost>maxChars) continue;kept.unshift(msg);total+=cost;}const firstSystem=msgs.find(m=>m.role==="system");if(firstSystem&&!kept.some(m=>m.role==="system")&&(total+firstSystem.content.length+32)<=maxChars){kept.unshift(firstSystem);total+=firstSystem.content.length+32;}if(kept.length===0){const fallback=(typeof req.prompt==="string"?req.prompt:norm(req.prompt)).trim();kept.push({role:"user",content:fallback.slice(-maxChars)||"Hello"});}process.stdout.write(JSON.stringify({model:"{{provider_model}}",messages:kept,stream:false}));}catch{process.stdout.write(JSON.stringify({model:"{{provider_model}}",messages:[{role:"user",content:"Hello"}],stream:false}));}});'
              )"
              printf "%s" "$PAYLOAD" | curl -fsS https://api.groq.com/openai/v1/chat/completions \
                -H "Authorization: Bearer $GROQ_API_KEY" \
                -H "Content-Type: application/json" \
                --data-binary @- | \
                node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{const out={output_text:"",tool_calls:[],finish_reason:"stop"};try{const res=JSON.parse(d);const choice=Array.isArray(res.choices)&&res.choices[0]&&typeof res.choices[0]==="object"?res.choices[0]:{};const msg=choice.message&&typeof choice.message==="object"?choice.message:{};const extractText=(content)=>{if(typeof content==="string") return content.trim();if(Array.isArray(content)){return content.map(part=>{if(typeof part==="string") return part;if(part&&typeof part==="object"){if(typeof part.text==="string") return part.text;if(typeof part.content==="string") return part.content;if(typeof part.output_text==="string") return part.output_text;if(typeof part.refusal==="string") return part.refusal;}return "";}).filter(Boolean).join("\n").trim();}if(content&&typeof content==="object"){if(typeof content.text==="string") return content.text.trim();if(typeof content.content==="string") return content.content.trim();if(typeof content.output_text==="string") return content.output_text.trim();if(typeof content.refusal==="string") return content.refusal.trim();}return "";};const content=extractText(msg.content)||extractText(msg.text)||extractText(msg.output_text)||extractText(msg.refusal)||extractText(choice.text)||extractText(choice.output_text)||extractText(res.output_text);const toolCalls=Array.isArray(msg.tool_calls)?msg.tool_calls.map((call,i)=>{if(!call||typeof call!=="object") return null;const fn=call.function&&typeof call.function==="object"?call.function:{};const name=typeof fn.name==="string"?fn.name.trim():"";if(!name) return null;const args=typeof fn.arguments==="string"?fn.arguments:JSON.stringify(fn.arguments??{});return {id:typeof call.id==="string"&&call.id?call.id:`call_${i+1}`,name,arguments:args};}).filter(Boolean):[];const finish=typeof choice.finish_reason==="string"&&choice.finish_reason?choice.finish_reason:(toolCalls.length>0?"tool_calls":"stop");out.output_text=content;out.tool_calls=toolCalls;out.finish_reason=finish;if(!content&&toolCalls.length===0){process.stderr.write(`Groq returned blank completion for model {{provider_model}} finish_reason=${finish} id=${typeof res.id==="string"?res.id:""}\n`);process.exit(86);}}catch(e){out.output_text=d.trim();}process.stdout.write(JSON.stringify(out));});'
          input: request_json_stdin
          output: json_contract
          timeoutMs: 120000
        auth:
          statusCommand:
            executable: sh
            args:
              - -lc
              - |
                test -n "${GROQ_API_KEY:-}" || { echo '{"ok":false,"error":"GROQ_API_KEY not set"}'; exit 1; }
                curl -fsS https://api.groq.com/openai/v1/models \
                  -H "Authorization: Bearer $GROQ_API_KEY" >/dev/null
                echo '{"ok":true}'
            timeoutMs: 15000

      - id: deepseek-api
        type: cli
        description: DeepSeek API
        models:
          - id: deepseek-chat
            providerModel: deepseek-chat
            fallbackModels:
              - deepseek-coder
          - id: deepseek-coder
            providerModel: deepseek-coder
            fallbackModels:
              - deepseek-chat
          - id: deepseek-reasoner
            providerModel: deepseek-reasoner
        responseCommand:
          executable: curl
          args:
            - -s
            - https://api.deepseek.com/chat/completions
            - -H
            - "Authorization: Bearer $DEEPSEEK_API_KEY"
            - -H
            - "Content-Type: application/json"
            - -d
            - |
              {
                "model": "{{provider_model}}",
                "messages": [{"role": "user", "content": "{{prompt}}"}],
                "temperature": 0.7
              }
          input: prompt_stdin
          output: text_contract_final_line
          timeoutMs: 120000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-openai-cli-gateway-home
  namespace: n8n-openai-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-openai-cli-gateway
  namespace: n8n-openai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-openai-cli-gateway
  template:
    metadata:
      labels:
        app: n8n-openai-cli-gateway
    spec:
      serviceAccountName: n8n-openai-cli-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: gemini-bootstrap
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - |
              set -eu
              export HOME=/var/lib/gateway-home
              export PATH="$HOME/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              mkdir -p "$HOME/.local/bin"
              if [ ! -x "$HOME/.local/bin/gemini" ]; then
                npm install -g --prefix "$HOME/.local" @google/gemini-cli
              fi
              "$HOME/.local/bin/gemini" --version >/dev/null
          env:
            - name: HOME
              value: /var/lib/gateway-home
            - name: PATH
              value: /var/lib/gateway-home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: provider-home
              mountPath: /var/lib/gateway-home
        - name: kimi-bootstrap
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - |
              set -eu
              export HOME=/var/lib/gateway-home
              export PATH="$HOME/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              mkdir -p "$HOME/.local/bin"
              if [ ! -x "$HOME/.local/bin/uv" ]; then
                curl -LsSf https://astral.sh/uv/install.sh | sh
              fi
              if [ ! -x "$HOME/.local/bin/kimi" ]; then
                "$HOME/.local/bin/uv" tool install --python 3.13 kimi-cli
              fi
              "$HOME/.local/bin/kimi" --version >/dev/null
          env:
            - name: HOME
              value: /var/lib/gateway-home
            - name: PATH
              value: /var/lib/gateway-home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: provider-home
              mountPath: /var/lib/gateway-home
      containers:
        - name: gateway
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: "info"
            - name: MAX_JOB_LOG_LINES
              value: "500"
            - name: PROVIDERS_CONFIG_PATH
              value: /app/config/providers.yaml
            - name: HOME
              value: /var/lib/gateway-home
            - name: PATH
              value: /var/lib/gateway-home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: N8N_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: n8nApiKey
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: adminApiKey
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: groqApiKey
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: deepseekApiKey
          volumeMounts:
            - name: providers-config
              mountPath: /app/config/providers.yaml
              subPath: providers.yaml
            - name: provider-home
              mountPath: /var/lib/gateway-home
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: providers-config
          configMap:
            name: n8n-openai-cli-gateway-config
        - name: provider-home
          persistentVolumeClaim:
            claimName: n8n-openai-cli-gateway-home
---
apiVersion: v1
kind: Service
metadata:
  name: n8n-openai-cli-gateway
  namespace: n8n-openai-gateway
  labels:
    app: n8n-openai-cli-gateway
spec:
  type: ClusterIP
  selector:
    app: n8n-openai-cli-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
