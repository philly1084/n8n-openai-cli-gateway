apiVersion: v1
kind: Namespace
metadata:
  name: n8n-openai-gateway
  labels:
    app.kubernetes.io/name: n8n-openai-cli-gateway
---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-openai-cli-gateway-secrets
  namespace: n8n-openai-gateway
type: Opaque
stringData:
  n8nApiKey: "replace-with-long-random-n8n-key"
  adminApiKey: "replace-with-long-random-admin-key"
  groqApiKey: "replace-with-groq-api-key"
  deepseekApiKey: "replace-with-deepseek-api-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: n8n-openai-gateway
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "replace-with-github-username",
          "password": "replace-with-github-token-read-packages"
        }
      }
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n-openai-cli-gateway
  namespace: n8n-openai-gateway
imagePullSecrets:
  - name: ghcr-secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-openai-cli-gateway-config
  namespace: n8n-openai-gateway
data:
  providers.yaml: |
    providers:
      - id: gemini-cli
        type: cli
        description: Gemini CLI adapter
        models:
          - id: gemini-3.1-pro-preview
            providerModel: gemini-3.1-pro-preview
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - gemini-3-flash-preview
          - id: gemini-3-flash-preview
            providerModel: gemini-3-flash-preview
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - gemini-3.1-pro-preview
          - id: gemini-3.1-flash-lite-preview
            providerModel: gemini-3.1-flash-lite-preview
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - gemini-3-flash-preview
          - id: gemini-2.5-pro
            providerModel: gemini-2.5-pro
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - gemini-3.1-pro-preview
          - id: gemini-2.5-flash
            providerModel: gemini-2.5-flash
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - gemini-3-flash-preview
        responseCommand:
          executable: sh
          args:
            - -lc
            - |
              REQUEST_JSON="$(cat)"
              HAS_TOOLS="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const tools=Array.isArray(req.tools)?req.tools:[];process.stdout.write(tools.length>0?"1":"0");}catch{process.stdout.write("0");}});'
              )"
              ALLOWED_TOOL_NAMES_JSON="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const tools=Array.isArray(req.tools)?req.tools:[];const names=[];for(const item of tools){if(!item||typeof item!=="object") continue;const fn=item.function&&typeof item.function==="object"?item.function:null;const name=fn&&typeof fn.name==="string"?fn.name.trim():"";if(name) names.push(name);}process.stdout.write(JSON.stringify(names));}catch{process.stdout.write("[]");}});'
              )"
              LAST_USER_TEXT="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const msgs=Array.isArray(req.messages)?req.messages:[];for(let i=msgs.length-1;i>=0;i--){const m=msgs[i];if(!m||typeof m!=="object") continue;if(String(m.role||"")==="user"){const c=typeof m.content==="string"?m.content:(m&&Object.prototype.hasOwnProperty.call(m,"content")?JSON.stringify(m.content??""):"");process.stdout.write(c||"");return;}}process.stdout.write("");}catch{process.stdout.write("");}});'
              )"
              HAS_TOOL_CONTEXT="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const msgs=Array.isArray(req.messages)?req.messages:[];const hasToolContext=msgs.some(m=>{if(!m||typeof m!=="object") return false;if(String(m.role||"")==="tool") return true;if(typeof m.tool_call_id==="string"&&m.tool_call_id.trim()) return true;const c=typeof m.content==="string"?m.content:(m&&Object.prototype.hasOwnProperty.call(m,"content")?JSON.stringify(m.content??""):"");return typeof c==="string"&&c.includes("TOOL_CALLS:");});process.stdout.write(hasToolContext?"1":"0");}catch{process.stdout.write("0");}});'
              )"
              SYNTHETIC_TOOL_CALL_JSON="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const tools=Array.isArray(req.tools)?req.tools:[];if(tools.length!==1){process.stdout.write("null");return;}const item=tools[0];if(!item||typeof item!=="object"){process.stdout.write("null");return;}const fn=item.function&&typeof item.function==="object"?item.function:null;const name=fn&&typeof fn.name==="string"?fn.name.trim():"";if(!name){process.stdout.write("null");return;}const description=typeof fn.description==="string"?fn.description:"";const params=fn&&fn.parameters&&typeof fn.parameters==="object"?fn.parameters:{};const props=params&&params.properties&&typeof params.properties==="object"?params.properties:{};const required=Array.isArray(params.required)?params.required.filter(x=>typeof x==="string"):[];const msgs=Array.isArray(req.messages)?req.messages:[];let userText="";for(let i=msgs.length-1;i>=0;i--){const m=msgs[i];if(!m||typeof m!=="object") continue;if(String(m.role||"")==="user"){userText=typeof m.content==="string"?m.content:JSON.stringify(m.content??"");break;}}const words=String(userText||"").toLowerCase().replace(/[^a-z0-9\s]/g," ").split(/\s+/).filter(Boolean).slice(0,8).join(" ");const session=(description.match(/sessionid\s*(?:is|=|:)\s*"([^"]+)"/i)||[])[1]||"LocalAgentMemory";const out={};const setArg=(key)=>{const lower=String(key||"").toLowerCase();if(/user|userid|session|account|tenant/.test(lower)){out[key]=session;return;}if(/content|query|search|keyword|text|prompt|message|input/.test(lower)){out[key]=words||userText||"memory";return;}out[key]="";};for(const key of required){setArg(key);}if(required.length===0){if(Object.prototype.hasOwnProperty.call(props,"userID")) out.userID=session;if(Object.prototype.hasOwnProperty.call(props,"content")) out.content=words||userText||"memory";}process.stdout.write(JSON.stringify({id:"call_1",name,arguments:out}));}catch{process.stdout.write("null");}});'
              )"
              PROMPT="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{const req=JSON.parse(d);const msgs=Array.isArray(req.messages)?req.messages:[];const tools=Array.isArray(req.tools)?req.tools:[];const metadata=req&&typeof req.metadata==="object"&&req.metadata?req.metadata:{};const toolChoice=metadata&&typeof metadata.tool_choice==="object"&&metadata.tool_choice?metadata.tool_choice:{};const forcedToolName=toolChoice&&toolChoice.type==="function"&&toolChoice.function&&typeof toolChoice.function==="object"&&typeof toolChoice.function.name==="string"?String(toolChoice.function.name).trim():"";const norm=v=>typeof v==="string"?v:JSON.stringify(v??"");const msgText=typeof req.prompt==="string"&&req.prompt.trim()?req.prompt:msgs.map(m=>{const role=String(m&&m.role?m.role:"user").toUpperCase();const name=m&&typeof m==="object"&&typeof m.name==="string"&&m.name?` (${m.name})`:"";const tcid=m&&typeof m==="object"&&typeof m.tool_call_id==="string"&&m.tool_call_id?` [tool_call_id=${m.tool_call_id}]`:"";return `${role}${name}${tcid}:\n${norm(m&&Object.prototype.hasOwnProperty.call(m,"content")?m.content:"")}`;}).join("\n\n");const toolCatalog=tools.map(item=>{if(!item||typeof item!=="object") return null;const fn=item.function&&typeof item.function==="object"?item.function:null;const name=fn&&typeof fn.name==="string"?fn.name.trim():"";if(!name) return null;const description=typeof fn.description==="string"&&fn.description.trim()?fn.description.trim():"Tool exposed by AVAILABLE_TOOLS_JSON.";const parameters=Object.prototype.hasOwnProperty.call(fn,"parameters")?fn.parameters:{type:"object",additionalProperties:true};return {name,description,parameters};}).filter(Boolean);const toolJson=JSON.stringify(tools,null,2);const toolCatalogJson=JSON.stringify(toolCatalog,null,2);const toolNames=toolCatalog.map(t=>t.name).join(", ");const instruction=["You are connected through an OpenAI-compatible gateway.","The tools listed in AVAILABLE_TOOLS_JSON are the only tools you can use in this turn.","Do not claim that tools are unavailable when AVAILABLE_TOOLS_JSON is non-empty.","Do not use any hidden or internal tools, shell commands, filesystem access, web browsing, or MCP tools.","TOOL: messages are outputs from previous tool calls.","When TOOL: messages are present and no more tools are needed, synthesize the final answer for the user in output_text.","Do not copy placeholder or example text into output_text.",forcedToolName?`tool_choice is set. You MUST call exactly this function name: ${forcedToolName}.`:"Use tools only when needed for external actions or data. For normal chat tasks including creative writing, respond directly with finish_reason stop.","When calling a tool, the name MUST exactly match one value from AVAILABLE_TOOL_NAMES.","Return raw JSON only. Do not wrap JSON in markdown or code fences.","If you need to call a tool, respond ONLY with JSON:","{\"output_text\":\"\",\"tool_calls\":[{\"id\":\"call_1\",\"name\":\"tool_name\",\"arguments\":{\"arg\":\"value\"}}],\"finish_reason\":\"tool_calls\"}","If no tool is needed, respond ONLY with JSON containing a real user-facing answer in output_text and \"finish_reason\":\"stop\".",""].join("\n");process.stdout.write([msgText,"","AVAILABLE_TOOLS_JSON:",toolJson,"","TOOL_CATALOG_JSON:",toolCatalogJson,"","AVAILABLE_TOOL_NAMES:",toolNames||"(none)","",instruction].join("\n"));});'
              )"
              RAW_OUTPUT="$(gemini --model "{{provider_model}}" --output-format stream-json --prompt "$PROMPT")" || exit $?
              printf "%s" "$RAW_OUTPUT" | node -e '
                let d="";
                const hasTools=process.argv[1]==="1";
                let allowedNames=[];
                try{
                  const parsedAllowed=JSON.parse(process.argv[2]||"[]");
                  if(Array.isArray(parsedAllowed)){
                    allowedNames=parsedAllowed.filter(v=>typeof v==="string"&&v.trim()).map(v=>v.trim());
                  }
                }catch{}
                const lastUserText=String(process.argv[3]||"");
                const hasToolContext=process.argv[4]==="1";
                let syntheticCall=null;
                try{
                  const parsedSynthetic=JSON.parse(process.argv[5]||"null");
                  if(parsedSynthetic&&typeof parsedSynthetic==="object"){
                    syntheticCall=parsedSynthetic;
                  }
                }catch{}
                const normalizeName=(name)=>String(name??"").trim().replace(/([a-z0-9])([A-Z])/g,"$1_$2").replace(/[\s\-./]+/g,"_").replace(/[^A-Za-z0-9_]/g,"_").replace(/_+/g,"_").replace(/^_+|_+$/g,"").toLowerCase();
                const allowedMap=new Map(allowedNames.map(n=>[normalizeName(n),n]));
                const normalizeAlias=(name)=>normalizeName(name).replace(/^(tool_|function_|fn_)+/,"").replace(/(_tool|_function|_fn|_api|_call)+$/,"");
                const resolveAllowedName=(name)=>{const raw=String(name??"").trim(); if(!raw) return ""; if(allowedMap.size===0) return raw; const direct=allowedMap.get(normalizeName(raw)); if(direct) return direct; const aliasNorm=normalizeAlias(raw); if(aliasNorm){const alias=allowedMap.get(aliasNorm); if(alias) return alias;} if(allowedNames.length===1){return allowedNames[0];} return "";};
                const getProp=(obj,keyCandidates)=>{if(!obj||typeof obj!=="object") return undefined; const source=obj; for(const key of keyCandidates){ if(Object.prototype.hasOwnProperty.call(source,key)){ return source[key]; }} const normalizedCandidates=keyCandidates.map(k=>normalizeName(k)); for(const [rawKey,val] of Object.entries(source)){ const normalizedRaw=normalizeName(rawKey); if(normalizedCandidates.includes(normalizedRaw)){ return val; }} return undefined;};
                const sanitizeArgKeys=(value,depth=0)=>{ if(depth>20) return value; if(Array.isArray(value)){ return value.map(item=>sanitizeArgKeys(item,depth+1)); } if(value&&typeof value==="object"){ const out={}; for(const [rawKey,rawVal] of Object.entries(value)){ const trimmedKey=String(rawKey??"").trim(); const key=trimmedKey||String(rawKey??""); out[key]=sanitizeArgKeys(rawVal,depth+1); } return out; } return value; };
                const asArgs=(value)=>{ if(typeof value==="string"){ const t=value.trim(); if(t&&(t.startsWith("{")||t.startsWith("["))){ try{ return JSON.stringify(sanitizeArgKeys(JSON.parse(t))); }catch{ return value; }} return value; } try{ return JSON.stringify(sanitizeArgKeys(value??{})); }catch{ return "{}"; } };
                const normalizeCall=(entry,index)=>{ if(!entry||typeof entry!=="object") return null; const obj=entry; const fn=obj.function&&typeof obj.function==="object"?obj.function:null; const fnCall=obj.functionCall&&typeof obj.functionCall==="object"?obj.functionCall:null; const fnCallSnake=obj.function_call&&typeof obj.function_call==="object"?obj.function_call:null; const merged=fnCall||fnCallSnake||fn; const rawName=(typeof getProp(obj,["name"])==="string"&&getProp(obj,["name"])?getProp(obj,["name"]):"")||(typeof getProp(obj,["tool_name","toolName"])==="string"&&getProp(obj,["tool_name","toolName"])?getProp(obj,["tool_name","toolName"]):"")||(typeof getProp(merged,["name"])==="string"&&getProp(merged,["name"])?getProp(merged,["name"]):""); const name=String(rawName||"").trim(); if(!name) return null; const mappedName=resolveAllowedName(name); if(allowedMap.size>0&&!mappedName) return null; const argsFromObj=getProp(obj,["arguments","args","parameters"]); const argsFromMerged=getProp(merged,["arguments","args","parameters"]); const argsRaw=argsFromObj!==undefined?argsFromObj:(argsFromMerged!==undefined?argsFromMerged:{}); const idFromObj=getProp(obj,["id","call_id","tool_id","toolId"]); const id=(typeof idFromObj==="string"&&idFromObj?String(idFromObj).trim():"")||`call_${index+1}`; return { id, name:mappedName||name, arguments:asArgs(argsRaw) }; };
                const appendCall=(out,item)=>{ const call=normalizeCall(item,out.length); if(call) out.push(call); };
                const normalizeCallList=(items)=>{ const src=Array.isArray(items)?items:[]; const out=[]; for(let i=0;i<src.length;i++){ const call=normalizeCall(src[i],out.length); if(call) out.push(call); } return out; };
                const dedupeByKey=(items,keyFn)=>{ const out=[]; const seen=new Set(); for(const item of items){ const key=keyFn(item); if(seen.has(key)) continue; seen.add(key); out.push(item); } return out; };
                if(syntheticCall&&typeof syntheticCall==="object"){ const n=typeof syntheticCall.name==="string"?syntheticCall.name.trim():""; const mapped=resolveAllowedName(n); if(!mapped){ syntheticCall=null; }else{ syntheticCall={ id:typeof syntheticCall.id==="string"&&syntheticCall.id?syntheticCall.id:"call_1", name:mapped, arguments:asArgs(syntheticCall.arguments) }; }} if(!syntheticCall&&allowedNames.length===1){ const fallbackName=allowedNames[0]; const shortQuery=String(lastUserText||"").toLowerCase().replace(/[^a-z0-9\\s]/g," ").split(/\\s+/).filter(Boolean).slice(0,8).join(" "); const fallbackArgs={ content: shortQuery||lastUserText||"memory" }; if(/working[_\\s-]?memory/i.test(fallbackName)){ fallbackArgs.userID="LocalAgentMemory"; } syntheticCall={ id:"call_1", name:fallbackName, arguments:asArgs(fallbackArgs) }; }
                const collectCallsFromObject=(value)=>{ if(Array.isArray(value)){ const res=[]; for(const item of value){ res.push(...collectCallsFromObject(item)); } return dedupeByKey(res,(c)=>`${c.id}\u0000${c.name}\u0000${c.arguments}`); } if(!value||typeof value!=="object") return []; const obj=value; const out=[]; const appendList=(items)=>{ for(const call of normalizeCallList(items)){ out.push(call); } }; appendList(obj.tool_calls); appendList(obj.toolCalls); appendList(obj.function_calls); appendList(obj.functionCalls); appendList(obj.calls); appendCall(out,obj.tool_call); appendCall(out,obj.functionCall); appendCall(out,obj.function_call); if(obj.type==="tool_use"){ appendCall(out,obj); } if(typeof obj.name==="string"&&(Object.prototype.hasOwnProperty.call(obj,"arguments")||Object.prototype.hasOwnProperty.call(obj,"args"))){ appendCall(out,obj); } if(obj.message&&typeof obj.message==="object"){ appendList(obj.message.tool_calls); appendList(obj.message.function_calls); appendCall(out,obj.message.functionCall); appendCall(out,obj.message.function_call); } const appendCallsFromParts=(parts)=>{ const list=Array.isArray(parts)?parts:[]; for(const part of list){ if(!part||typeof part!=="object") continue; appendCall(out,part); appendCall(out,part.functionCall); appendCall(out,part.function_call); } }; if(obj.content&&typeof obj.content==="object"){ appendCallsFromParts(obj.content.parts); } const candidates=Array.isArray(obj.candidates)?obj.candidates:[]; for(const candidate of candidates){ if(!candidate||typeof candidate!=="object") continue; if(candidate.content&&typeof candidate.content==="object"){ appendCallsFromParts(candidate.content.parts); } } return dedupeByKey(out,(c)=>`${c.id}\u0000${c.name}\u0000${c.arguments}`); };
                const isSyntheticText=(value)=>{ const t=String(value??"").trim().toLowerCase().replace(/\s+/g," "); return t==="<assistant reply>"||t==="[assistant reply]"||t==="assistant reply"||t==="reply to the user directly."||t==="__example_final_answer__"||t==="provide your actual helpful response here."; };
                const collectTextChunks=(value)=>{ const out=[]; if(Array.isArray(value)){ for(const item of value){ out.push(...collectTextChunks(item)); } return out; } const push=(v)=>{ if(typeof v!=="string") return; const t=v.trim(); if(t&&!isSyntheticText(t)) out.push(t); }; if(typeof value==="string"){ push(value); return out; } if(!value||typeof value!=="object") return out; const obj=value; push(obj.output_text); push(obj.text); push(obj.response); push(obj.content); if(obj.message&&typeof obj.message==="object"){ push(obj.message.content); push(obj.message.text); } if(Array.isArray(obj.candidates)){ for(const candidate of obj.candidates){ if(!candidate||typeof candidate!=="object") continue; if(candidate.content&&typeof candidate.content==="object"&&Array.isArray(candidate.content.parts)){ for(const part of candidate.content.parts){ if(!part||typeof part!=="object") continue; push(part.text); push(part.content); } } } } return out; };
                process.stdin.on("data",c=>d+=c).on("end",()=>{ const t=d.trim(); if(!t){ process.stdout.write(JSON.stringify({output_text:"",finish_reason:"stop"})); return; } const lines=t.split(/\r?\n/).map(line=>line.trim()).filter(Boolean); const toolCalls=[]; const textChunks=[]; let parsedAny=false; for(const line of lines){ let parsed=null; try{ parsed=JSON.parse(line); parsedAny=true; }catch{ continue; } for(const call of collectCallsFromObject(parsed)){ toolCalls.push(call); } for(const chunk of collectTextChunks(parsed)){ textChunks.push(chunk); } } const outputText=[...new Set(textChunks)].join("\n").trim(); const fallbackText=parsedAny?"":t; const uniqueCalls=[]; const seen=new Set(); for(const call of toolCalls){ const key=`${call.id}\u0000${call.name}\u0000${call.arguments}`; if(seen.has(key)) continue; seen.add(key); uniqueCalls.push(call); } const userAskedTool=/\b(use|call|invoke|run|search|find|look|query|check|health|build|deploy|remote)\b/.test(lastUserText.toLowerCase()); if(hasTools&&uniqueCalls.length>0){ process.stdout.write(JSON.stringify({output_text:outputText,tool_calls:uniqueCalls,finish_reason:"tool_calls"})); return; } if(hasTools&&!hasToolContext&&syntheticCall&&userAskedTool){ process.stdout.write(JSON.stringify({output_text:outputText,tool_calls:[syntheticCall],finish_reason:"tool_calls"})); return; } process.stdout.write(JSON.stringify({output_text:outputText||fallbackText,finish_reason:"stop"})); });
              ' "$HAS_TOOLS" "$ALLOWED_TOOL_NAMES_JSON" "$LAST_USER_TEXT" "$HAS_TOOL_CONTEXT" "$SYNTHETIC_TOOL_CALL_JSON"
          input: request_json_stdin
          output: json_contract
          timeoutMs: 240000
        auth:
          loginCommand:
            executable: sh
            args:
              - -c
              - |
                echo "Gemini CLI login is interactive in this version."
                echo "Run in a TTY shell: gemini"
                echo "Then run: /auth and choose Login with Google."
                exit 1
            timeoutMs: 900000
          statusCommand:
            executable: sh
            args:
              - -c
              - |
                test -f "$HOME/.gemini/oauth_creds.json" \
                  && echo '{"ok":true,"source":"oauth_creds.json"}' \
                  || (echo '{"ok":false,"error":"missing ~/.gemini/oauth_creds.json"}' && exit 1)
            timeoutMs: 30000

      - id: codex-cli
        type: cli
        description: OpenAI Codex app-server bridge adapter
        models:
          - id: codex-latest
            providerModel: codex-latest
            fallbackModels:
              - gpt-5.4
              - gemini-3.1-pro-preview
          - id: gpt-5.4
            providerModel: gpt-5.4
            fallbackModels:
              - gpt-5.4-pro
              - gemini-3.1-pro-preview
          - id: gpt-5.4-pro
            providerModel: gpt-5.4-pro
            fallbackModels:
              - gpt-5.4
              - gemini-3.1-pro-preview
          - id: gpt-5.3-instant
            providerModel: gpt-5.3-instant
            fallbackModels:
              - gpt-5.4
          - id: gpt-4.1
            providerModel: gpt-4.1
            fallbackModels:
              - gpt-5.3-instant
          - id: gpt-5.1-codex-mini
            providerModel: gpt-5.1-codex-mini
            fallbackModels:
              - gpt-5.4
        responseCommand:
          executable: node
          args:
            - dist/scripts/codex-appserver-bridge.js
            - --model
            - "{{provider_model}}"
          input: request_json_stdin
          output: json_contract
          timeoutMs: 240000
        auth:
          loginCommand:
            executable: codex
            args:
              - login
              - --no-browser
            timeoutMs: 900000
          statusCommand:
            executable: codex
            args:
              - whoami
              - --json
            timeoutMs: 30000

      - id: kimi-code-cli
        type: cli
        description: Kimi Code ACP bridge adapter
        models:
          - id: kimi-for-coding
            providerModel: kimi-for-coding
          - id: kimi-k2-turbo-preview
            providerModel: kimi-for-coding
        responseCommand:
          executable: node
          args:
            - dist/scripts/kimi-acp-bridge.js
            - --model
            - "{{provider_model}}"
          input: request_json_stdin
          output: json_contract
          timeoutMs: 240000
        auth:
          loginCommand:
            executable: sh
            args:
              - -c
              - |
                echo "Kimi CLI login is interactive."
                echo "Run in a TTY shell: kimi"
                echo "Then run: /login and complete auth."
                echo "If your installed minor version still uses /setup, use that instead."
                exit 1
            timeoutMs: 900000
          statusCommand:
            executable: sh
            args:
              - -c
              - |
                if [ -f "$HOME/.kimi/config.toml" ] || [ -f "$HOME/.kimi/config.json" ]; then
                  echo '{"ok":true,"source":"~/.kimi/config.toml"}'
                  exit 0
                fi
                echo '{"ok":false,"error":"missing ~/.kimi/config.toml or ~/.kimi/config.json (run kimi then /login, or /setup on older releases)"}'
                exit 1
            timeoutMs: 30000

      - id: groq-api
        type: cli
        description: Groq API via curl using Groq production chat models
        models:
          - id: groq/compound
            providerModel: groq/compound
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - openai/gpt-oss-20b
          - id: groq/compound-mini
            providerModel: groq/compound-mini
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - openai/gpt-oss-20b
          - id: openai/gpt-oss-120b
            providerModel: openai/gpt-oss-120b
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - openai/gpt-oss-20b
          - id: openai/gpt-oss-20b
            providerModel: openai/gpt-oss-20b
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
              - llama-3.1-8b-instant
          - id: llama-3.3-70b-versatile
            providerModel: llama-3.3-70b-versatile
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
          - id: llama-3.1-8b-instant
            providerModel: llama-3.1-8b-instant
            fallbackModels:
              - gpt-5.4
              - kimi-for-coding
        responseCommand:
          executable: sh
          args:
            - -lc
            - |
              REQUEST_JSON="$(cat)"
              HAS_TOOLS="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const tools=Array.isArray(req.tools)?req.tools:[];process.stdout.write(tools.length>0?"1":"0");}catch{process.stdout.write("0");}});'
              )"
              if [ "$HAS_TOOLS" = "1" ]; then
                echo "Groq CLI provider does not reliably support gateway-managed tool turns. Retry with fallback." >&2
                exit 86
              fi
              PAYLOAD="$(
                printf "%s" "$REQUEST_JSON" | node -e 'let d="";const maxChars=Number(process.env.GROQ_MAX_PROMPT_CHARS||120000);const model="{{provider_model}}";const suppressLocalToolCalling=/^groq\/compound(?:-mini)?$/i.test(model);const dedupe=parts=>{const out=[];const seen=new Set();for(const part of parts){const trimmed=String(part??"").trim();if(!trimmed||seen.has(trimmed)) continue;seen.add(trimmed);out.push(trimmed);}return out;};const collectText=(value,depth=0,seen=new WeakSet())=>{if(depth>8||value===null||value===undefined) return [];if(typeof value==="string") return value.trim()?[value.trim()]:[];if(Array.isArray(value)) return dedupe(value.flatMap(item=>collectText(item,depth+1,seen)));if(typeof value!=="object") return [];if(seen.has(value)) return [];seen.add(value);return dedupe([value.text,value.input_text,value.output_text,value.content,value.value].flatMap(item=>collectText(item,depth+1,seen)));};const extractText=value=>collectText(value).join("\n").trim();const normalizeContent=value=>{const text=extractText(value);if(text) return text;if(value===null||value===undefined) return "";try{return JSON.stringify(value);}catch{return String(value);}};const stripAssistantToolContext=value=>{const text=normalizeContent(value).trim();const marker="\n\nTOOL_CALLS:\n";const fallback="TOOL_CALLS:\n";const markerIndex=text.indexOf(marker);if(markerIndex>=0)return text.slice(0,markerIndex).trim();const fallbackIndex=text.indexOf(fallback);if(fallbackIndex>=0)return text.slice(0,fallbackIndex).trim();return text;};process.stdin.on("data",c=>d+=c).on("end",()=>{try{const req=JSON.parse(d);const rawMsgs=Array.isArray(req.messages)?req.messages:[];const allowedRoles=new Set(["system","user","assistant","tool"]);const msgs=rawMsgs.map(m=>{const role=allowedRoles.has(String(m&&m.role||""))?String(m.role):"user";const rawValue=m&&Object.prototype.hasOwnProperty.call(m,"content")?m.content:"";const rawContent=normalizeContent(rawValue);const content=suppressLocalToolCalling&&role==="assistant"?stripAssistantToolContext(rawContent):rawContent.trim();if(!content)return null;if(suppressLocalToolCalling&&role==="tool"){return {role:"user",content:`Context from a previous tool result:\n${content}`};}const out={role,content};if(!suppressLocalToolCalling&&role==="tool"&&m&&typeof m==="object"&&typeof m.tool_call_id==="string"&&m.tool_call_id){out.tool_call_id=m.tool_call_id;}if(!suppressLocalToolCalling&&role==="assistant"&&m&&typeof m==="object"&&Array.isArray(m.tool_calls)&&m.tool_calls.length>0){out.tool_calls=m.tool_calls;}return out;}).filter(Boolean);let total=0;const kept=[];for(let i=msgs.length-1;i>=0;i--){const msg=msgs[i];const cost=msg.content.length+msg.role.length+32;if(kept.length>0&&total+cost>maxChars) continue;kept.unshift(msg);total+=cost;}const firstSystem=msgs.find(m=>m.role==="system");if(firstSystem&&!kept.some(m=>m.role==="system")&&(total+firstSystem.content.length+32)<=maxChars){kept.unshift(firstSystem);total+=firstSystem.content.length+32;}if(kept.length===0){const fallback=(typeof req.prompt==="string"?req.prompt:normalizeContent(req.prompt)).trim();kept.push({role:"user",content:fallback.slice(-maxChars)||"Hello"});}process.stdout.write(JSON.stringify({model,messages:kept,stream:false}));}catch{process.stdout.write(JSON.stringify({model,messages:[{role:"user",content:"Hello"}],stream:false}));}});'
              )"
              printf "%s" "$PAYLOAD" | curl -fsS https://api.groq.com/openai/v1/chat/completions \
                -H "Authorization: Bearer $GROQ_API_KEY" \
                -H "Content-Type: application/json" \
                --data-binary @- | \
                node -e 'let d="";const invalidFragments=["final answer could not be synthesized from the model response","could not be synthesized from the model response"];const normalize=v=>String(v??"").trim().toLowerCase().replace(/\s+/g," ");const dedupe=parts=>{const out=[];const seen=new Set();for(const part of parts){const trimmed=String(part??"").trim();if(!trimmed||seen.has(trimmed)) continue;seen.add(trimmed);out.push(trimmed);}return out;};const collectText=(value,depth=0,seen=new WeakSet())=>{if(depth>8||value===null||value===undefined) return [];if(typeof value==="string") return value.trim()?[value.trim()]:[];if(Array.isArray(value)) return dedupe(value.flatMap(item=>collectText(item,depth+1,seen)));if(typeof value!=="object") return [];if(seen.has(value)) return [];seen.add(value);return dedupe([value.text,value.content,value.output_text,value.refusal,value.message,value.response,value.value].flatMap(item=>collectText(item,depth+1,seen)));};const extractText=value=>collectText(value).join("\n").trim();const summarizeShape=(value,depth=0)=>{if(depth>4||value===null||value===undefined) return undefined;if(typeof value==="string") return "string";if(Array.isArray(value)) return value.slice(0,5).map(item=>summarizeShape(item,depth+1));if(typeof value!=="object") return typeof value;return {type:typeof value.type==="string"?value.type:"object",keys:Object.keys(value).slice(0,10)};};process.stdin.on("data",c=>d+=c).on("end",()=>{const out={output_text:"",tool_calls:[],finish_reason:"stop"};try{const res=JSON.parse(d);const choice=Array.isArray(res.choices)&&res.choices[0]&&typeof res.choices[0]==="object"?res.choices[0]:{};const msg=choice.message&&typeof choice.message==="object"?choice.message:{};const content=extractText(msg.content)||extractText(msg.text)||extractText(msg.output_text)||extractText(msg.refusal)||extractText(choice.text)||extractText(choice.output_text)||extractText(res.output_text);const toolCalls=Array.isArray(msg.tool_calls)?msg.tool_calls.map((call,i)=>{if(!call||typeof call!=="object") return null;const fn=call.function&&typeof call.function==="object"?call.function:{};const name=typeof fn.name==="string"?fn.name.trim():"";if(!name) return null;const args=typeof fn.arguments==="string"?fn.arguments:JSON.stringify(fn.arguments??{});return {id:typeof call.id==="string"&&call.id?call.id:`call_${i+1}`,name,arguments:args};}).filter(Boolean):[];const finish=typeof choice.finish_reason==="string"&&choice.finish_reason?choice.finish_reason:(toolCalls.length>0?"tool_calls":"stop");out.output_text=content;out.tool_calls=toolCalls;out.finish_reason=finish;const normalizedContent=normalize(content);const isSyntheticFailure=toolCalls.length===0&&invalidFragments.some(fragment=>normalizedContent.includes(fragment));if((!content&&toolCalls.length===0)||isSyntheticFailure){process.stderr.write(`Groq returned invalid completion for model {{provider_model}} finish_reason=${finish} id=${typeof res.id==="string"?res.id:""} synthetic_failure=${isSyntheticFailure?"true":"false"} content_shape=${JSON.stringify(summarizeShape(msg.content))} content=${JSON.stringify(String(content||"").slice(0,160))}\n`);process.exit(86);}}catch(e){out.output_text=d.trim();}process.stdout.write(JSON.stringify(out));});'
          input: request_json_stdin
          output: json_contract
          timeoutMs: 120000
        auth:
          statusCommand:
            executable: sh
            args:
              - -lc
              - |
                test -n "${GROQ_API_KEY:-}" || { echo '{"ok":false,"error":"GROQ_API_KEY not set"}'; exit 1; }
                curl -fsS https://api.groq.com/openai/v1/models \
                  -H "Authorization: Bearer $GROQ_API_KEY" >/dev/null
                echo '{"ok":true}'
            timeoutMs: 15000

      - id: deepseek-api
        type: openai
        description: DeepSeek API
        baseUrl: https://api.deepseek.com
        apiKeyEnv: DEEPSEEK_API_KEY
        timeoutMs: 120000
        models:
          - id: deepseek-chat
            providerModel: deepseek-chat
            fallbackModels:
              - deepseek-reasoner
          - id: deepseek-coder
            providerModel: deepseek-chat
            description: Backward-compatible DeepSeek coding alias mapped to deepseek-chat
            fallbackModels:
              - deepseek-reasoner
          - id: deepseek-reasoner
            providerModel: deepseek-reasoner
            fallbackModels:
              - deepseek-chat
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-openai-cli-gateway-home
  namespace: n8n-openai-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-openai-cli-gateway
  namespace: n8n-openai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-openai-cli-gateway
  template:
    metadata:
      labels:
        app: n8n-openai-cli-gateway
    spec:
      serviceAccountName: n8n-openai-cli-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: gemini-bootstrap
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: Always
          command:
            - sh
            - -lc
            - |
              set -eu
              export HOME=/var/lib/gateway-home
              export PATH="$HOME/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              mkdir -p "$HOME/.local/bin"
              if [ ! -x "$HOME/.local/bin/gemini" ]; then
                npm install -g --prefix "$HOME/.local" @google/gemini-cli
              fi
              "$HOME/.local/bin/gemini" --version >/dev/null
          env:
            - name: HOME
              value: /var/lib/gateway-home
            - name: PATH
              value: /var/lib/gateway-home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: provider-home
              mountPath: /var/lib/gateway-home
        - name: kimi-bootstrap
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: Always
          command:
            - sh
            - -lc
            - |
              set -eu
              export HOME=/var/lib/gateway-home
              export PATH="$HOME/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              mkdir -p "$HOME/.local/bin"
              if [ ! -x "$HOME/.local/bin/uv" ]; then
                curl -LsSf https://astral.sh/uv/install.sh | sh
              fi
              if [ -x "$HOME/.local/bin/kimi" ]; then
                "$HOME/.local/bin/uv" tool upgrade kimi-cli --no-cache
              else
                "$HOME/.local/bin/uv" tool install --python 3.13 kimi-cli
              fi
              "$HOME/.local/bin/kimi" --version >/dev/null
          env:
            - name: HOME
              value: /var/lib/gateway-home
            - name: PATH
              value: /var/lib/gateway-home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: provider-home
              mountPath: /var/lib/gateway-home
        - name: gemini-auth-bootstrap
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: Always
          command:
            - sh
            - -lc
            - |
              set -eu
              export HOME=/var/lib/gateway-home
              BOOTSTRAP_DIR=/bootstrap/gemini
              TARGET_DIR="$HOME/.gemini"
              if [ -f "$TARGET_DIR/oauth_creds.json" ]; then
                echo "Gemini auth already present in $TARGET_DIR"
                exit 0
              fi
              set -- "$BOOTSTRAP_DIR"/*
              if [ "$1" = "$BOOTSTRAP_DIR/*" ]; then
                echo "No Gemini auth bootstrap secret mounted; skipping seed"
                exit 0
              fi
              mkdir -p "$TARGET_DIR"
              cp "$BOOTSTRAP_DIR"/* "$TARGET_DIR"/
              chmod 700 "$TARGET_DIR"
              chmod 600 "$TARGET_DIR"/* || true
              echo "Seeded Gemini auth into $TARGET_DIR"
          env:
            - name: HOME
              value: /var/lib/gateway-home
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: provider-home
              mountPath: /var/lib/gateway-home
            - name: gemini-auth-seed
              mountPath: /bootstrap/gemini
              readOnly: true
      containers:
        - name: gateway
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: "info"
            - name: MAX_JOB_LOG_LINES
              value: "500"
            - name: PROVIDERS_CONFIG_PATH
              value: /app/config/providers.yaml
            - name: HOME
              value: /var/lib/gateway-home
            - name: PATH
              value: /var/lib/gateway-home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: N8N_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: n8nApiKey
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: adminApiKey
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: groqApiKey
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: deepseekApiKey
          volumeMounts:
            - name: providers-config
              mountPath: /app/config/providers.yaml
              subPath: providers.yaml
            - name: provider-home
              mountPath: /var/lib/gateway-home
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: providers-config
          configMap:
            name: n8n-openai-cli-gateway-config
        - name: provider-home
          persistentVolumeClaim:
            claimName: n8n-openai-cli-gateway-home
        - name: gemini-auth-seed
          secret:
            secretName: n8n-openai-cli-gateway-gemini-auth
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: n8n-openai-cli-gateway
  namespace: n8n-openai-gateway
  labels:
    app: n8n-openai-cli-gateway
spec:
  type: ClusterIP
  selector:
    app: n8n-openai-cli-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
