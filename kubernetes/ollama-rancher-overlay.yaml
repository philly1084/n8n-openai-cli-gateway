apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models-gemma4
  namespace: n8n-openai-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: n8n-openai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: ollama
          image: ollama/ollama:0.17.7
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              trap 'kill -TERM "$OLLAMA_PID"; wait "$OLLAMA_PID"' TERM INT

              ollama serve &
              OLLAMA_PID=$!

              until ollama list >/dev/null 2>&1; do
                sleep 2
              done

              ollama pull gemma4:e4b
              ollama pull gemma4:e2b
              ollama pull gemma3:1b

              touch /tmp/models-ready
              wait "$OLLAMA_PID"
          ports:
            - name: http
              containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0:11434
            - name: OLLAMA_NO_CLOUD
              value: "1"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
            - name: OLLAMA_MAX_QUEUE
              value: "64"
            - name: OLLAMA_CONTEXT_LENGTH
              value: "8192"
            - name: OLLAMA_KEEP_ALIVE
              value: "30m"
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - test -f /tmp/models-ready
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "4"
              memory: 20Gi
            limits:
              cpu: "8"
              memory: 24Gi
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models-gemma4
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: n8n-openai-gateway
spec:
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: http
  type: ClusterIP

# Gateway note:
# Point the Ollama bridge at this service from providers.yaml:
#   OLLAMA_BASE_URL: http://ollama:11434/api
#
# This manifest pulls these models during startup:
#   - gemma4:e4b
#   - gemma4:e2b
#   - gemma3:1b
#
# Adjust storage/resources if you want larger contexts or more concurrency.
