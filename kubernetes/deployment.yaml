apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-openai-cli-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-openai-cli-gateway
  template:
    metadata:
      labels:
        app: n8n-openai-cli-gateway
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      initContainers:
        - name: gemini-bootstrap
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: Always
          command:
            - sh
            - -lc
            - |
              set -eu
              export HOME=/var/lib/gateway-home
              export PATH="$HOME/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              mkdir -p "$HOME/.local/bin"
              if [ ! -x "$HOME/.local/bin/gemini" ]; then
                npm install -g --prefix "$HOME/.local" @google/gemini-cli
              fi
              "$HOME/.local/bin/gemini" --version >/dev/null
          env:
            - name: HOME
              value: /var/lib/gateway-home
            - name: PATH
              value: /var/lib/gateway-home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: provider-home
              mountPath: /var/lib/gateway-home
        - name: gemini-auth-bootstrap
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: Always
          command:
            - sh
            - -lc
            - |
              set -eu
              export HOME=/var/lib/gateway-home
              BOOTSTRAP_DIR=/bootstrap/gemini
              TARGET_DIR="$HOME/.gemini"
              if [ -f "$TARGET_DIR/oauth_creds.json" ]; then
                echo "Gemini auth already present in $TARGET_DIR"
                exit 0
              fi
              set -- "$BOOTSTRAP_DIR"/*
              if [ "$1" = "$BOOTSTRAP_DIR/*" ]; then
                echo "No Gemini auth bootstrap secret mounted; skipping seed"
                exit 0
              fi
              mkdir -p "$TARGET_DIR"
              cp "$BOOTSTRAP_DIR"/* "$TARGET_DIR"/
              chmod 700 "$TARGET_DIR"
              chmod 600 "$TARGET_DIR"/* || true
              echo "Seeded Gemini auth into $TARGET_DIR"
          env:
            - name: HOME
              value: /var/lib/gateway-home
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: provider-home
              mountPath: /var/lib/gateway-home
            - name: gemini-auth-seed
              mountPath: /bootstrap/gemini
              readOnly: true
      containers:
        - name: gateway
          image: ghcr.io/philly1084/n8n-openai-cli-gateway:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: "info"
            - name: PROVIDERS_CONFIG_PATH
              value: /app/config/providers.yaml
            - name: HOME
              value: /var/lib/gateway-home
            - name: PATH
              value: /var/lib/gateway-home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: N8N_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: n8nApiKey
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-openai-cli-gateway-secrets
                  key: adminApiKey
          volumeMounts:
            - name: providers-config
              mountPath: /app/config/providers.yaml
              subPath: providers.yaml
            - name: provider-home
              mountPath: /var/lib/gateway-home
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: providers-config
          configMap:
            name: n8n-openai-cli-gateway-config
        - name: provider-home
          persistentVolumeClaim:
            claimName: n8n-openai-cli-gateway-home
        - name: gemini-auth-seed
          secret:
            secretName: n8n-openai-cli-gateway-gemini-auth
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: n8n-openai-cli-gateway
spec:
  selector:
    app: n8n-openai-cli-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-openai-cli-gateway-home
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
